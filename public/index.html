<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Compro o quê?!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📈</text></svg>" />
<style>
  :root{
    --bg:#0a0b0f; --panel:#11131a; --panel-2:#15171f; --line:#1e2130;
    --text:#f4f4f5; --muted:#a1a1aa; --accent:#22d3ee; --good:#22c55e;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px 60px;}
  /* Header */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
  .title{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .sub{color:var(--muted);font-size:13px;margin-top:7px;}
  .live{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#3f3f46;box-shadow:0 0 0 0 rgba(34,197,94,.5);}
  .dot.on{background:var(--good);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  /* Card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .chart-head .lbl{font-size:14px;font-weight:600;color:var(--text);}
  .ranges{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;}
  .range-btn{background:var(--panel-2);color:var(--muted);border:1px solid transparent;border-radius:999px;
    font-size:12px;font-weight:600;padding:5px 10px;cursor:pointer;line-height:1;}
  .range-btn.active{color:var(--accent);border-color:rgba(34,211,238,.4);}
  .head-left{display:flex;align-items:center;gap:8px;min-width:0;}
  .axis-toggle{background:var(--panel-2);color:var(--muted);border:1px solid transparent;border-radius:999px;
    font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer;line-height:1;letter-spacing:.03em;}
  .axis-toggle.fit{color:var(--accent);border-color:rgba(34,211,238,.4);}
  .chart-box{position:relative;height:230px;width:100%;}
  /* Legend chips */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none;}
  .chip .swatch{width:10px;height:10px;border-radius:50%;}
  .chip.off{opacity:.4;}
  .chip.off .swatch{filter:grayscale(1);}
  /* Ranked list */
  .rank-list{display:flex;flex-direction:column;gap:10px;}
  .row{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .row-btn{all:unset;display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;
    padding:14px;cursor:pointer;}
  .rank-num{color:var(--muted);font-size:13px;font-weight:700;width:18px;text-align:center;flex:none;}
  .tok{flex:1;min-width:0;}
  .tok .sym{font-size:16px;font-weight:700;}
  .tok .nm{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .flag{color:var(--muted);font-style:italic;font-size:11px;margin-top:3px;}
  .score-wrap{display:flex;flex-direction:column;align-items:flex-end;flex:none;}
  .score{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em;}
  .verdict{font-size:11px;font-weight:700;letter-spacing:.04em;margin-top:4px;}
  .chev{flex:none;color:var(--muted);transition:transform .25s ease;margin-left:2px;}
  .row.open .chev{transform:rotate(180deg);}
  /* Expand panel */
  .panel{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .panel-inner{padding:0 14px 14px;border-top:1px solid var(--line);}
  .reading{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
  .reading:last-of-type{border-bottom:none;}
  .reading .k{color:var(--muted);font-size:13px;}
  .reading .v{display:flex;align-items:baseline;gap:8px;}
  .reading .val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
  .delta{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
  .delta.up{color:var(--good);} .delta.down{color:#f87171;} .delta.na{color:var(--muted);}
  .foot{color:var(--muted);font-size:11px;margin-top:10px;font-style:italic;}
  /* Manage */
  .manage{display:flex;gap:8px;align-items:center;margin-top:18px;}
  .manage select{flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    border-radius:12px;padding:11px 12px;font-size:14px;font-weight:600;}
  .add-btn{background:var(--accent);color:#06212a;border:none;border-radius:12px;width:46px;height:44px;
    font-size:22px;font-weight:700;cursor:pointer;line-height:1;flex:none;}
  .empty,.err{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px;}
  .err{color:#f87171;}
  /* Token colour accent bar */
  .row-btn{position:relative;}
  .acc{position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:0 3px 3px 0;}
  /* Clickable logo */
  .title{cursor:pointer;display:inline-block;}
  .title:active{opacity:.65;}
  /* Report modal */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.62);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;padding:18px 12px;overflow-y:auto;}
  .modal-back.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    max-width:560px;width:100%;margin:auto;padding:18px 16px 22px;}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .modal-head h2{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em;}
  .modal-head .when{color:var(--muted);font-size:12px;margin-top:4px;}
  .modal-x{all:unset;cursor:pointer;color:var(--muted);font-size:24px;line-height:1;padding:0 6px;border-radius:8px;}
  .modal-x:hover{background:var(--panel-2);color:var(--text);}
  .report-intro{color:var(--muted);font-size:13px;line-height:1.5;margin-top:12px;}
  .report-topic{margin-top:18px;}
  .report-topic h3{font-size:14.5px;font-weight:700;margin:0 0 2px;}
  .report-topic .desc{color:var(--muted);font-size:12px;line-height:1.45;margin-bottom:4px;}
  .report-line{font-size:13px;line-height:1.55;margin-top:5px;}
  .report-line .g{color:var(--good);font-weight:700;font-variant-numeric:tabular-nums;}
  .report-line .r{color:#f87171;font-weight:700;font-variant-numeric:tabular-nums;}
  .report-line .n{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
  .report-disc{color:var(--muted);font-size:11.5px;font-style:italic;line-height:1.5;margin-top:18px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title" id="logo" title="Ver relatório">Compro o quê?!</div>
      <div class="sub" id="dateline">—</div>
    </div>
    <div class="live"><span class="dot" id="livedot"></span><span id="livetext">—</span></div>
  </header>

  <!-- Score progression chart ON TOP -->
  <div class="card">
    <div class="chart-head">
      <div class="head-left">
        <span class="lbl">Score progression</span>
        <button class="axis-toggle" id="axis-toggle" title="Toggle y-axis zoom (Fit = spread the lines, Full = 0–10)">Fit</button>
      </div>
      <div class="ranges" id="ranges"></div>
    </div>
    <div class="chart-box"><canvas id="chart"></canvas></div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- Ranked token list -->
  <div class="rank-list" id="ranklist"></div>

  <!-- Manage tokens -->
  <div class="manage">
    <select id="manage-select">
      <option value="">Manage tokens…</option>
    </select>
    <button class="add-btn" id="add-btn" title="Add a token">+</button>
  </div>
</div>

<!-- Benchmarking report (opens when the logo is tapped) -->
<div class="modal-back" id="report-back">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Relatório Compro o quê?!">
    <div class="modal-head">
      <div>
        <h2>Relatório Compro o quê?!</h2>
        <div class="when" id="report-when"></div>
      </div>
      <button class="modal-x" id="report-x" aria-label="Fechar">×</button>
    </div>
    <div id="report-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="config.js"></script>
<script>
(function(){
  "use strict";
  var CFG = window.BESTBUY_CONFIG || {};
  var SB_URL = CFG.SUPABASE_URL, SB_KEY = CFG.SUPABASE_ANON_KEY;

  var RANGES = [
    {k:'7d',days:7},{k:'15d',days:15},{k:'30d',days:30},{k:'60d',days:60},
    {k:'90d',days:90},{k:'6m',days:182},{k:'1y',days:365},{k:'all',days:null}
  ];
  var DEFAULT_RANGE = '30d';
  var GOOD_ZONE = 6.5;

  var state = { tokens:[], readingsByToken:{}, range:DEFAULT_RANGE, hidden:{}, openRow:null, chart:null, axisMode:'fit' };

  // ── helpers ─────────────────────────────────────────────────────────────────
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
  function r1(n){ return n==null||isNaN(n)?null:Math.round(n*10)/10; }
  function fmtScore(n){ return n==null?'—':n.toFixed(1); }
  function fmtNum(n,d){ if(n==null||isNaN(n))return 'n/a'; return Number(n).toFixed(d==null?2:d); }
  function fmtUsd(n){
    if(n==null||isNaN(n))return 'n/a';
    var a=Math.abs(n);
    if(a>=1e9)return '$'+(n/1e9).toFixed(2)+'B';
    if(a>=1e6)return '$'+(n/1e6).toFixed(2)+'M';
    if(a>=1e3)return '$'+(n/1e3).toFixed(1)+'K';
    return '$'+n.toFixed(2);
  }
  function fmtPct(n){ if(n==null||isNaN(n))return 'n/a'; return (n*100).toFixed(1)+'%'; }
  function verdict(s){
    if(s==null) return {label:'N/A',good:false};
    if(s>=8.0) return {label:'STRONG BUY',good:true};
    if(s>=6.5) return {label:'BUY',good:true};
    if(s>=4.5) return {label:'NEUTRAL',good:false};
    if(s>=3.0) return {label:'WEAK',good:false};
    return {label:'AVOID',good:false};
  }

  function sbGet(path){
    return fetch(SB_URL+'/rest/v1/'+path, {headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY}})
      .then(function(r){ if(!r.ok) throw new Error('Supabase '+r.status); return r.json(); });
  }
  // Paged fetch: PostgREST caps each response at db-max-rows (1000 on this project),
  // and a `limit` param can't exceed that cap — so we page with limit/offset until a
  // short page signals the end. Pass `path` WITHOUT limit/offset.
  function sbGetAll(path){
    var PAGE=1000, all=[];
    var sep = path.indexOf('?')>=0 ? '&' : '?';
    function page(offset){
      return sbGet(path+sep+'limit='+PAGE+'&offset='+offset).then(function(rows){
        all=all.concat(rows);
        if(rows.length<PAGE) return all;
        return page(offset+PAGE);
      });
    }
    return page(0);
  }
  function sbPost(table, body){
    return fetch(SB_URL+'/rest/v1/'+table, {method:'POST',
      headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal'},
      body:JSON.stringify(body)}).then(function(r){ if(!r.ok) throw new Error('insert '+r.status); });
  }
  function sbPatch(path, body){
    return fetch(SB_URL+'/rest/v1/'+path, {method:'PATCH',
      headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal'},
      body:JSON.stringify(body)}).then(function(r){ if(!r.ok) throw new Error('update '+r.status); });
  }

  // ── data load ───────────────────────────────────────────────────────────────
  function load(){
    if(!SB_URL || SB_URL.indexOf('__')===0){
      document.getElementById('ranklist').innerHTML =
        '<div class="err">Supabase not configured. Fill in <b>public/config.js</b> with your project URL + anon key.</div>';
      return;
    }
    Promise.all([
      sbGet('tracked_tokens?active=eq.true&select=*&order=created_at.asc'),
      sbGetAll('score_readings?select=*&order=fetched_at.asc')
    ]).then(function(res){
      state.tokens = res[0];
      var byTok = {};
      res[1].forEach(function(row){ (byTok[row.token_id]=byTok[row.token_id]||[]).push(row); });
      state.readingsByToken = byTok;
      renderAll();
    }).catch(function(e){
      document.getElementById('ranklist').innerHTML = '<div class="err">Failed to load: '+e.message+'</div>';
    });
  }

  function latestOf(tid){ var a=state.readingsByToken[tid]; return a&&a.length?a[a.length-1]:null; }
  function prevOf(tid){ var a=state.readingsByToken[tid]; return a&&a.length>1?a[a.length-2]:null; }

  // ── header ──────────────────────────────────────────────────────────────────
  function renderHeader(){
    var newest=null;
    Object.keys(state.readingsByToken).forEach(function(tid){
      var l=latestOf(tid); if(l && (!newest || l.fetched_at>newest)) newest=l.fetched_at;
    });
    var d = newest? new Date(newest): new Date();
    document.getElementById('dateline').textContent =
      d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})+' · 3 readings/day';
    var today = new Date(); var isToday = newest &&
      d.getUTCFullYear()===today.getUTCFullYear() && d.getUTCMonth()===today.getUTCMonth() && d.getUTCDate()===today.getUTCDate();
    document.getElementById('livedot').className = 'dot'+(isToday?' on':'');
    document.getElementById('livetext').textContent = isToday?'updated today':'updated '+d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  }

  // ── ranges ──────────────────────────────────────────────────────────────────
  function renderRanges(){
    var box=document.getElementById('ranges'); box.innerHTML='';
    RANGES.forEach(function(rg){
      var b=el('button','range-btn'+(rg.k===state.range?' active':''),rg.k);
      b.onclick=function(){ state.range=rg.k; renderRanges(); renderChart(); };
      box.appendChild(b);
    });
  }
  function rangeCutoff(){
    var rg=RANGES.filter(function(r){return r.k===state.range;})[0];
    if(!rg||rg.days==null) return null;
    return Date.now()-rg.days*86400000;
  }

  // ── chart ───────────────────────────────────────────────────────────────────
  var greenZonePlugin = {
    id:'greenZone',
    beforeDatasetsDraw:function(chart){
      var ctx=chart.ctx, ca=chart.chartArea, y=chart.scales.y;
      if(!ca||!y) return;
      // Nothing to draw when the BUY zone sits entirely above the visible window
      // (happens in Fit mode when every score is below 6.5).
      if(GOOD_ZONE >= y.max) return;
      var top10=y.getPixelForValue(10), yBase=y.getPixelForValue(GOOD_ZONE);
      var fillTop=Math.max(ca.top, top10), fillBase=Math.min(ca.bottom, yBase);
      if(fillBase>fillTop){
        var g=ctx.createLinearGradient(0,top10,0,yBase);
        g.addColorStop(0,'rgba(34,197,94,0.30)');
        g.addColorStop(0.45,'rgba(34,197,94,0.13)');
        g.addColorStop(1,'rgba(34,197,94,0.02)');
        ctx.save();
        ctx.fillStyle=g;
        ctx.fillRect(ca.left,fillTop,ca.right-ca.left,fillBase-fillTop);
        ctx.restore();
      }
      // dotted baseline at 6.5, only when it falls inside the visible window
      if(GOOD_ZONE>=y.min && GOOD_ZONE<=y.max){
        ctx.save();
        ctx.beginPath(); ctx.setLineDash([2,3]); ctx.lineWidth=1;
        ctx.strokeStyle='rgba(34,197,94,0.30)';
        ctx.moveTo(ca.left,yBase); ctx.lineTo(ca.right,yBase); ctx.stroke();
        ctx.restore();
      }
    }
  };

  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dualAxisPlugin = {
    id:'dualAxis',
    afterDraw:function(chart){
      var ctx=chart.ctx, ca=chart.chartArea, x=chart.scales.x;
      if(!ca||!x) return;
      var min=x.min, max=x.max;
      if(min==null||max==null) return;
      var spanDays=(max-min)/86400000;
      ctx.save();
      ctx.textAlign='center';
      var yT1=ca.bottom+15, yT2=ca.bottom+30;

      if(spanDays<=75){
        // ── short ranges: day-of-month on top tier, month + year below ──
        var d0=new Date(min);
        var base=Date.UTC(d0.getUTCFullYear(),d0.getUTCMonth(),d0.getUTCDate());
        var step = spanDays<=10?1 : spanDays<=20?2 : spanDays<=35?3 : 7;
        var first=base; if(first<min) first+=86400000;
        var lastPx=-999;
        for(var t=first, g=0; t<=max && g<400; t+=86400000, g++){
          var dayIdx=Math.round((t-base)/86400000);
          if(dayIdx%step!==0) continue;
          var px=x.getPixelForValue(t);
          if(px<ca.left-2||px>ca.right+2||px-lastPx<18) continue;
          ctx.font='10px -apple-system,sans-serif';
          ctx.fillStyle='#71717a';
          ctx.fillText(String(new Date(t).getUTCDate()), px, yT1);
          lastPx=px;
        }
        // month + year band: at range start and each month boundary
        var mMarks=[{t:min, m:d0.getUTCMonth(), y:d0.getUTCFullYear()}];
        var mm=new Date(Date.UTC(d0.getUTCFullYear(),d0.getUTCMonth()+1,1));
        for(var g2=0; mm.getTime()<=max && g2<12; g2++){
          mMarks.push({t:mm.getTime(), m:mm.getUTCMonth(), y:mm.getUTCFullYear()});
          mm=new Date(Date.UTC(mm.getUTCFullYear(),mm.getUTCMonth()+1,1));
        }
        var lastMpx=-999;
        mMarks.forEach(function(mk){
          var px=x.getPixelForValue(mk.t);
          if(px<ca.left-2||px>ca.right+2||px-lastMpx<48) return;
          ctx.font='700 10px -apple-system,sans-serif';
          ctx.fillStyle='#a1a1aa';
          ctx.fillText(MON[mk.m]+' '+mk.y, px, yT2);
          lastMpx=px;
        });
      } else {
        // ── long ranges: month names on top tier, year (bold) below ──
        var d=new Date(min); var marks=[];
        var cur=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),1));
        if(cur.getTime()<min) cur=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,1));
        for(var gg=0; cur.getTime()<=max && gg<60; gg++){
          marks.push(new Date(cur));
          cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+1,1));
        }
        var lastYearPx=-999;
        marks.forEach(function(m,i){
          var px=x.getPixelForValue(m.getTime());
          if(px<ca.left-2||px>ca.right+2) return;
          ctx.font='11px -apple-system,sans-serif';
          ctx.fillStyle='#a1a1aa';
          ctx.fillText(MON[m.getUTCMonth()],px,yT1);
          var isYearBoundary = m.getUTCMonth()===0 || i===0;
          if(isYearBoundary && px-lastYearPx>30){
            ctx.font='700 11px -apple-system,sans-serif';
            ctx.fillStyle='#f4f4f5';
            ctx.fillText(String(m.getUTCFullYear()),px,yT2);
            lastYearPx=px;
          }
        });
      }
      ctx.restore();
    }
  };

  // y-axis bounds: 'full' = fixed 0–10; 'fit' = zoom to the visible (non-hidden)
  // scores with padding, rounded to 0.5, so bunched lines spread apart.
  function computeYBounds(datasets){
    if(state.axisMode!=='fit') return {min:0, max:10, step:2};
    var lo=Infinity, hi=-Infinity;
    datasets.forEach(function(ds){
      if(ds.hidden) return;
      ds.data.forEach(function(p){ if(p.y<lo)lo=p.y; if(p.y>hi)hi=p.y; });
    });
    if(!isFinite(lo)||!isFinite(hi)) return {min:0, max:10, step:2};
    var pad=Math.max(0.3,(hi-lo)*0.15);
    var min=Math.max(0, Math.floor((lo-pad)*2)/2);
    var max=Math.min(10, Math.ceil((hi+pad)*2)/2);
    if(max-min<1){ max=Math.min(10, min+1); if(max-min<1) min=Math.max(0, max-1); }
    var span=max-min;
    return {min:min, max:max, step: span<=2?0.5 : span<=5?1 : 2};
  }

  function renderChart(){
    var cutoff=rangeCutoff();
    var datasets=state.tokens.map(function(t){
      var rows=(state.readingsByToken[t.id]||[]).filter(function(r){
        var ms=new Date(r.fetched_at).getTime();
        return cutoff==null || ms>=cutoff;
      });
      return {
        label:t.symbol,
        tokenId:t.id,
        borderColor:t.color,
        backgroundColor:t.color,
        borderWidth:2,
        data:rows.map(function(r){ return {x:new Date(r.fetched_at).getTime(), y:Number(r.final_score)}; }),
        tension:0.4, pointRadius:0, pointHitRadius:8, hidden:!!state.hidden[t.id]
      };
    });

    var yb=computeYBounds(datasets);

    if(state.chart) state.chart.destroy();
    var ctx=document.getElementById('chart').getContext('2d');
    state.chart=new Chart(ctx,{
      type:'line',
      data:{datasets:datasets},
      options:{
        animation:false, responsive:true, maintainAspectRatio:false,
        layout:{padding:{bottom:34, top:4, left:2, right:6}},
        interaction:{mode:'nearest',intersect:false},
        scales:{
          x:{ type:'linear', min:cutoff==null?undefined:cutoff, grid:{display:false},
              ticks:{display:false}, border:{display:false} },
          y:{ min:yb.min, max:yb.max, grid:{color:'rgba(255,255,255,0.05)'},
              border:{display:false},
              ticks:{color:'#52525b', stepSize:yb.step, font:{size:10}} }
        },
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#15171f', borderColor:'#1e2130', borderWidth:1,
            titleColor:'#a1a1aa', bodyColor:'#f4f4f5', padding:10, displayColors:true,
            callbacks:{
              title:function(items){ return new Date(items[0].parsed.x).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); },
              label:function(it){ return it.dataset.label+': '+Number(it.parsed.y).toFixed(1); }
            }
          }
        }
      },
      plugins:[greenZonePlugin, dualAxisPlugin]
    });
  }

  // ── legend chips ──────────────────────────────────────────────────────────────
  function renderLegend(){
    var box=document.getElementById('legend'); box.innerHTML='';
    state.tokens.forEach(function(t){
      var chip=el('span','chip'+(state.hidden[t.id]?' off':''));
      var sw=el('span','swatch'); sw.style.background=t.color; chip.appendChild(sw);
      chip.appendChild(el('span',null,t.symbol));
      chip.onclick=function(){ state.hidden[t.id]=!state.hidden[t.id]; renderLegend(); renderChart(); };
      box.appendChild(chip);
    });
  }

  // ── ranked list + expand ──────────────────────────────────────────────────────
  // reading-panel field definitions; higherBetter drives the ▲/▼ improved colour.
  function readingFields(latest, prev){
    var rew = latest.reweighted;
    function delta(curKey, higherBetter){
      var cur=latest[curKey], pr=prev?prev[curKey]:null;
      if(cur==null||pr==null||isNaN(cur)||isNaN(pr)||Number(pr)===0) return {txt:'n/a',cls:'na'};
      var pct=(Number(cur)-Number(pr))/Math.abs(Number(pr))*100;
      if(Math.abs(pct)<0.05) return {txt:'0.0%',cls:'na'};
      var improved = higherBetter ? pct>0 : pct<0;
      var arrow = pct>0?'▲':'▼';
      return {txt:arrow+' '+Math.abs(pct).toFixed(1)+'%', cls:improved?'up':'down'};
    }
    return [
      {k:'Price vs MAs',        val:fmtScore(r1(latest.score_price_ma)), d:delta('score_price_ma',true)},
      {k:'Below 1-year high',    val:fmtScore(r1(latest.score_below_high)), d:delta('score_below_high',true)},
      {k:'RSI (14d)',           val:fmtNum(latest.rsi_14,1), d:delta('rsi_14',false)},
      {k:'TVL trend',           val:rew?'—':fmtUsd(latest.tvl),            d:rew?{txt:'n/a',cls:'na'}:delta('tvl',true)},
      {k:'Holders rev (ann.)',  val:rew?'—':fmtUsd(latest.holders_revenue),d:rew?{txt:'n/a',cls:'na'}:delta('holders_revenue',true)},
      {k:'Emissions rate',      val:rew?'—':fmtPct(latest.emissions_rate), d:rew?{txt:'n/a',cls:'na'}:delta('emissions_rate',false)}
    ];
  }

  function renderRankList(){
    var box=document.getElementById('ranklist'); box.innerHTML='';
    var ranked=state.tokens.map(function(t){ return {t:t, l:latestOf(t.id)}; })
      .filter(function(x){ return x.l; })
      .sort(function(a,b){ return Number(b.l.final_score)-Number(a.l.final_score); });

    if(!ranked.length){ box.appendChild(el('div','empty','No readings yet — run the backfill and the first cron fetch.')); return; }

    ranked.forEach(function(x,idx){
      var t=x.t, latest=x.l, prev=prevOf(t.id);
      var v=verdict(Number(latest.final_score));
      var row=el('div','row'+(state.openRow===t.id?' open':''));

      var btn=el('button','row-btn');
      var acc=el('span','acc'); acc.style.background=t.color; btn.appendChild(acc);
      btn.appendChild(el('span','rank-num',String(idx+1)));
      var tok=el('div','tok');
      tok.appendChild(el('div','sym',t.symbol));
      tok.appendChild(el('div','nm',t.name));
      if(latest.reweighted) tok.appendChild(el('div','flag','fundamentals N/A · market-only'));
      btn.appendChild(tok);

      var sw=el('div','score-wrap');
      var sc=el('div','score',fmtScore(Number(latest.final_score))); sc.style.color=t.color; sw.appendChild(sc);
      var vd=el('div','verdict',v.label); vd.style.color=v.good?t.color:'#a1a1aa'; sw.appendChild(vd);
      btn.appendChild(sw);

      var chev=el('span','chev','⌄'); chev.style.fontSize='18px'; btn.appendChild(chev);
      btn.onclick=function(){ state.openRow = state.openRow===t.id?null:t.id; renderRankList(); };
      row.appendChild(btn);

      var panel=el('div','panel');
      var inner=el('div','panel-inner');
      readingFields(latest, prev).forEach(function(f){
        var r=el('div','reading');
        r.appendChild(el('div','k',f.k));
        var vbox=el('div','v');
        vbox.appendChild(el('span','val',f.val));
        vbox.appendChild(el('span','delta '+f.d.cls,f.d.txt));
        r.appendChild(vbox);
        inner.appendChild(r);
      });
      inner.appendChild(el('div','foot','Δ vs previous reading (last 8h)'));
      panel.appendChild(inner);
      row.appendChild(panel);
      box.appendChild(row);

      if(state.openRow===t.id){ requestAnimationFrame(function(){ panel.style.maxHeight=inner.scrollHeight+'px'; }); }
    });
  }

  // ── manage tokens ──────────────────────────────────────────────────────────
  function renderManage(){
    var sel=document.getElementById('manage-select');
    sel.innerHTML='';
    sel.appendChild(new Option('Manage tokens…',''));
    state.tokens.forEach(function(t){ sel.appendChild(new Option('Remove '+t.symbol+' (keeps history)', 'rm:'+t.id)); });
    sel.appendChild(new Option('+ add new token','add'));
    sel.onchange=function(){
      var val=sel.value; sel.value='';
      if(val==='add') return addToken();
      if(val.indexOf('rm:')===0){
        var id=val.slice(3); var t=state.tokens.filter(function(x){return x.id===id;})[0];
        if(t && confirm('Stop tracking '+t.symbol+'? History is kept; it just stops updating.')){
          sbPatch('tracked_tokens?id=eq.'+id, {active:false}).then(load).catch(function(e){ alert('Failed: '+e.message); });
        }
      }
    };
    document.getElementById('add-btn').onclick=addToken;
  }
  function addToken(){
    var symbol=prompt('Token symbol (e.g. AERO):'); if(!symbol) return;
    var cg=prompt('CoinGecko id (e.g. aerodrome-finance):'); if(!cg) return;
    var slug=prompt('DefiLlama slug (optional — leave blank for market-only):')||null;
    var color=prompt('Hex color (optional, e.g. #22d3ee):')||'#22d3ee';
    var name=prompt('Display name (optional):')||symbol;
    sbPost('tracked_tokens', [{symbol:symbol.toUpperCase().trim(), name:name.trim(),
      coingecko_id:cg.trim(), defillama_slug:slug?slug.trim():null, color:color.trim()}])
      .then(function(){ alert(symbol.toUpperCase()+' added. It will be scored on the next cron run.'); load(); })
      .catch(function(e){ alert('Failed to add: '+e.message); });
  }

  // ── benchmarking report (pt-PT) — opens on logo tap ──────────────────────────
  var PT_MON=['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
  function ptDate(iso){ var d=iso?new Date(iso):new Date(); return d.getUTCDate()+' '+PT_MON[d.getUTCMonth()]+' '+d.getUTCFullYear(); }
  function ptVerdict(s){
    if(s==null)   return 'sem dados suficientes';
    if(s>=8.0)    return 'sinal forte de compra';
    if(s>=6.5)    return 'boa altura para comprar';
    if(s>=4.5)    return 'momento neutro, sem pressa';
    if(s>=3.0)    return 'fraco, melhor aguardar';
    return 'arriscado, evitar por agora';
  }
  function clsScore(s){ return s==null?'n': s>=6.5?'g': s<=4.5?'r':'n'; }
  function clsDelta(cur,prev,higherBetter){
    if(cur==null||prev==null||isNaN(cur)||isNaN(prev)||Number(prev)===0) return 'n';
    var up=Number(cur)>Number(prev), down=Number(cur)<Number(prev);
    if(!up&&!down) return 'n';
    return (higherBetter?up:down)?'g':'r';
  }
  function rLine(parts){
    var p=el('div','report-line');
    parts.forEach(function(seg){
      if(typeof seg==='string') p.appendChild(document.createTextNode(seg));
      else p.appendChild(el('span',seg.c||'n',seg.n));
    });
    return p;
  }
  function buildReport(){
    var body=document.getElementById('report-body'); body.innerHTML='';
    var ranked=state.tokens.map(function(t){ return {t:t,l:latestOf(t.id),p:prevOf(t.id)}; })
      .filter(function(x){ return x.l; })
      .sort(function(a,b){ return Number(b.l.final_score)-Number(a.l.final_score); });

    if(!ranked.length){
      document.getElementById('report-when').textContent='';
      body.appendChild(el('div','report-intro','Ainda não há dados suficientes para gerar o relatório.'));
      return;
    }
    document.getElementById('report-when').textContent='Atualizado a '+ptDate(ranked[0].l.fetched_at);
    body.appendChild(el('div','report-intro',
      'Comparação simples dos '+ranked.length+' ativos do seu painel, sem termos complicados. '+
      'Os números a verde são bons sinais; os números a vermelho são sinais de alerta.'));

    function topic(title,desc){
      var box=el('div','report-topic');
      box.appendChild(el('h3',null,title));
      if(desc) box.appendChild(el('div','desc',desc));
      body.appendChild(box); return box;
    }

    // 1 — Nota geral
    var t1=topic('Nota geral (1 a 10)','A nossa nota junta todos os sinais numa única pontuação fácil de ler.');
    ranked.forEach(function(x){
      var s=Number(x.l.final_score);
      t1.appendChild(rLine(['O '+x.t.symbol+' está com ', {n:fmtScore(s)+'/10', c:clsScore(s)}, ' — '+ptVerdict(s)+'.']));
    });

    // 2 — Preço face à média
    var t2=topic('Preço face à média','Mostra se o preço está acima (bom sinal) ou abaixo (sinal fraco) da média recente.');
    ranked.forEach(function(x){
      var v=x.l.score_price_ma, sv=v==null?null:Number(v);
      t2.appendChild(rLine([x.t.symbol+': ', {n:(sv==null?'—':fmtScore(sv)+'/10'), c:clsScore(sv)},
        ' — preço '+(sv==null?'sem dados':(sv>=5?'acima':'abaixo')+' da média recente')+'.']));
    });

    // 3 — Barato ou esticado (RSI)
    var t3=topic('Está barato ou esticado? (RSI)','O RSI vai de 0 a 100: abaixo de 30 costuma estar barato, acima de 70 esticado.');
    ranked.forEach(function(x){
      var r=x.l.rsi_14, rv=r==null?null:Number(r);
      var c=rv==null?'n': rv<30?'g': rv>70?'r':'n';
      var txt=rv==null?'sem dados': rv<30?'pode estar barato': rv>70?'pode estar caro (esticado)':'em equilíbrio';
      t3.appendChild(rLine([x.t.symbol+': ', {n:(rv==null?'—':fmtNum(rv,0)), c:c}, ' — '+txt+'.']));
    });

    // 4 — Distância ao topo do último ano
    var t4=topic('Quão longe do topo do último ano?','Quanto mais abaixo do valor máximo dos últimos 12 meses, mais barato o ativo parece estar.');
    ranked.forEach(function(x){
      var v=x.l.score_below_high, sv=v==null?null:Number(v);
      var txt=sv==null?'sem dados': sv>=6?'bem abaixo do topo, mais barato': sv<=4?'perto do topo, mais caro':'a meio caminho';
      t4.appendChild(rLine([x.t.symbol+': ', {n:(sv==null?'—':fmtScore(sv)+'/10'), c:clsScore(sv)}, ' — '+txt+'.']));
    });

    // 5 — Fundamentos
    var t5=topic('O projeto tem uso real? (fundamentos)','Dinheiro depositado no projeto (TVL) e as receitas mostram se há uso verdadeiro.');
    ranked.forEach(function(x){
      if(x.l.reweighted){
        t5.appendChild(rLine([x.t.symbol+': ', {n:'sem dados', c:'n'}, ' — avaliado apenas pelo preço de mercado.']));
      } else {
        var pr=x.p||{};
        t5.appendChild(rLine([x.t.symbol+': depósitos ', {n:fmtUsd(x.l.tvl), c:clsDelta(x.l.tvl,pr.tvl,true)},
          ', receita anual ', {n:fmtUsd(x.l.holders_revenue), c:clsDelta(x.l.holders_revenue,pr.holders_revenue,true)}, '.']));
      }
    });

    // 6 — Conclusão
    var top=ranked[0], bot=ranked[ranked.length-1];
    var t6=topic('Conclusão',null);
    t6.appendChild(rLine(['Hoje, o '+top.t.symbol+' reúne os melhores sinais, com ',
      {n:fmtScore(Number(top.l.final_score))+'/10', c:clsScore(Number(top.l.final_score))}, '.']));
    if(bot!==top){
      t6.appendChild(rLine(['O '+bot.t.symbol+' é o mais arriscado de momento, com ',
        {n:fmtScore(Number(bot.l.final_score))+'/10', c:clsScore(Number(bot.l.final_score))}, '.']));
    }
    body.appendChild(el('div','report-disc',
      'Isto não é aconselhamento financeiro. São apenas sinais automáticos — faça sempre a sua própria análise antes de investir.'));
  }
  function openReport(){ buildReport(); document.getElementById('report-back').classList.add('show'); }
  function closeReport(){ document.getElementById('report-back').classList.remove('show'); }

  function renderAll(){ renderHeader(); renderRanges(); renderChart(); renderLegend(); renderRankList(); renderManage(); }

  var axisBtn=document.getElementById('axis-toggle');
  function syncAxisToggle(){
    axisBtn.textContent = state.axisMode==='fit' ? 'Fit' : 'Full';
    axisBtn.className = 'axis-toggle'+(state.axisMode==='fit' ? ' fit' : '');
  }
  axisBtn.onclick=function(){ state.axisMode = state.axisMode==='fit' ? 'full' : 'fit'; syncAxisToggle(); renderChart(); };
  syncAxisToggle();

  document.getElementById('logo').onclick=openReport;
  document.getElementById('report-x').onclick=closeReport;
  document.getElementById('report-back').onclick=function(e){ if(e.target===this) closeReport(); };
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeReport(); });

  load();
})();
</script>
</body>
