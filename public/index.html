<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Compro o quê?!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📈</text></svg>" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
<style>
  :root{
    --bg:#0a0b0f; --panel:#11131a; --panel-2:#15171f; --line:#1e2130;
    --text:#f4f4f5; --muted:#a1a1aa; --accent:#22d3ee; --good:#22c55e;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px 60px;}
  /* Header */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
  .title{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .sub{color:var(--muted);font-size:13px;margin-top:7px;}
  .live{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#3f3f46;box-shadow:0 0 0 0 rgba(34,197,94,.5);}
  .dot.on{background:var(--good);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  /* Card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
  .chart-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .chart-head .lbl{font-size:14px;font-weight:600;color:var(--text);padding-top:4px;}
  .head-controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  /* Bare pillar toggle icons (no pill/border/label) */
  .pillars{display:flex;gap:14px;justify-content:flex-end;align-items:center;}
  .pillar-ico{font-size:21px;line-height:1;cursor:pointer;transition:color .15s ease;}
  .ranges{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;}
  .range-btn{background:var(--panel-2);color:var(--muted);border:1px solid transparent;border-radius:999px;
    font-size:12px;font-weight:600;padding:5px 10px;cursor:pointer;line-height:1;}
  .range-btn.active{color:var(--accent);border-color:rgba(34,211,238,.4);}
  .chart-box{position:relative;height:230px;width:100%;}
  #signal-tip{position:absolute;z-index:6;pointer-events:none;display:none;max-width:230px;
    background:#15171f;border:1px solid #1e2130;border-radius:8px;padding:8px 10px;
    font-size:11px;line-height:1.5;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,0.45);transform:translate(-50%,-100%);}
  #signal-tip .st-h{font-weight:700;letter-spacing:0.02em;margin-bottom:2px;}
  #signal-tip .st-row{color:var(--muted);}
  #signal-tip .st-row b{color:var(--text);font-weight:600;}
  /* Legend chips */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center;}
  /* select-all / clear-all eye toggle — icon only, no chip background or border,
     matching the data-category (pillar) icon size, white outline. */
  .legend-eye{font-size:21px;line-height:1;cursor:pointer;color:#fff;display:inline-flex;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none;}
  .chip .swatch{width:10px;height:10px;border-radius:50%;}
  .chip.off{opacity:.4;}
  .chip.off .swatch{filter:grayscale(1);}
  /* Ranked list */
  .rank-list{display:flex;flex-direction:column;gap:10px;}
  .row{background:#15171f;border:1px solid var(--line);border-left-width:3px;border-radius:var(--radius);overflow:hidden;}
  .row-btn{all:unset;display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;
    padding:14px;cursor:pointer;}
  .rank-num{color:var(--muted);font-size:13px;font-weight:700;width:18px;text-align:center;flex:none;}
  .tok{flex:1;min-width:0;}
  .tok .sym{font-size:16px;font-weight:700;}
  .tok .nm{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .tok .nm .price{color:var(--text);font-weight:600;}
  .flag{color:var(--muted);font-style:italic;font-size:11px;margin-top:3px;}
  /* Collapsed-row score bar (black track, green fill = blended %) */
  .score-bar{width:62px;height:6px;background:#000;border-radius:3px;overflow:hidden;flex:none;}
  .score-bar > span{display:block;height:100%;background:var(--good);border-radius:3px;}
  .score-wrap{display:flex;flex-direction:column;align-items:flex-end;flex:none;}
  .score{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em;}
  .verdict{font-size:11px;font-weight:700;letter-spacing:.04em;margin-top:4px;}
  .chev{flex:none;color:var(--muted);transition:transform .25s ease;margin-left:2px;}
  .row.open .chev{transform:rotate(180deg);}
  /* Expand panel */
  .panel{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .panel-inner{padding:0 14px 14px;border-top:1px solid var(--line);}
  .panel-cols{display:flex;gap:18px;}
  .panel-readings{flex:1;min-width:0;}
  .panel-pillars{width:172px;flex:none;}
  @media(max-width:420px){ .panel-cols{flex-direction:column;gap:4px;} .panel-pillars{width:auto;} }
  .reading{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
  .reading:last-of-type{border-bottom:none;}
  .reading .k{color:var(--muted);font-size:13px;}
  .reading .v{display:flex;align-items:baseline;gap:8px;}
  .reading .val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
  .delta{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
  .delta.up{color:var(--good);} .delta.down{color:#f87171;} .delta.na{color:var(--muted);}
  .foot{color:var(--muted);font-size:11px;margin-top:10px;font-style:italic;}
  /* PILLARS mini-section */
  .pillars-mini h4{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin:14px 0 8px;}
  .pmini{margin-bottom:12px;}
  .pmini-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .pmini-head .lab{font-size:12.5px;font-weight:600;}
  .pmini-head .pv{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  .ptrack{height:7px;background:#000;border-radius:4px;overflow:hidden;}
  .ptrack > span{display:block;height:100%;border-radius:4px;}
  .pmini-off{font-size:12px;font-style:italic;color:var(--muted);}
  /* Manage */
  .manage{display:flex;gap:8px;align-items:center;margin-top:18px;}
  .manage select{flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    border-radius:12px;padding:11px 12px;font-size:14px;font-weight:600;}
  .add-btn{background:var(--accent);color:#06212a;border:none;border-radius:12px;width:46px;height:44px;
    font-size:22px;font-weight:700;cursor:pointer;line-height:1;flex:none;}
  .empty,.err{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px;}
  .err{color:#f87171;}
  /* Excel export */
  .export{margin-top:14px;text-align:center;}
  .export-btn{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;}
  .export-btn:hover{border-color:rgba(52,211,153,.5);color:#34d399;}
  .export-btn:disabled{opacity:.55;cursor:default;}
  .export-note{color:var(--muted);font-size:11px;margin-top:7px;font-style:italic;}
  /* Clickable logo */
  .title{cursor:pointer;display:inline-block;}
  .title:active{opacity:.65;}
  /* Report modal */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.62);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;padding:18px 12px;overflow-y:auto;}
  .modal-back.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    max-width:560px;width:100%;margin:auto;padding:18px 16px 22px;}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .modal-head h2{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em;}
  .modal-head .when{color:var(--muted);font-size:12px;margin-top:4px;}
  .modal-x{all:unset;cursor:pointer;color:var(--muted);font-size:24px;line-height:1;padding:0 6px;border-radius:8px;}
  .modal-x:hover{background:var(--panel-2);color:var(--text);}
  .report-intro{color:var(--muted);font-size:13px;line-height:1.5;margin-top:12px;}
  .report-topic{margin-top:18px;}
  .report-topic h3{font-size:14.5px;font-weight:700;margin:0 0 2px;}
  .report-topic .desc{color:var(--muted);font-size:12px;line-height:1.45;margin-bottom:4px;}
  .report-line{font-size:13px;line-height:1.55;margin-top:5px;}
  .report-line .g{color:var(--good);font-weight:700;font-variant-numeric:tabular-nums;}
  .report-line .r{color:#f87171;font-weight:700;font-variant-numeric:tabular-nums;}
  .report-line .n{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
  .report-disc{color:var(--muted);font-size:11.5px;font-style:italic;line-height:1.5;margin-top:18px;}
</style>

<!-- ===== PJDC266 PIN gate — decorative overlay (see commit note; NOT real security) =====
     CSS is inlined here (not an external file) and the unlock check runs before paint, so the
     gate is on-screen the instant the body parses and an already-authenticated tab never flashes
     the gate. Everything is namespaced `pjdc266-` so it can't collide with the dashboard. -->
<style id="pjdc266-gate-style">
  /* Blur the real dashboard while locked; transition makes the reveal smooth. */
  .wrap,.modal-back{transition:filter 0.77s cubic-bezier(.4,0,.2,1);}
  html:not(.pjdc266-unlocked) .wrap,
  html:not(.pjdc266-unlocked) .modal-back{filter:blur(9px) brightness(0.5);pointer-events:none;}
  html:not(.pjdc266-unlocked) body{overflow:hidden;}
  /* Once unlocked, the gate layers are gone entirely. */
  html.pjdc266-unlocked #pjdc266-matrix,
  html.pjdc266-unlocked #pjdc266-scan,
  html.pjdc266-unlocked #pjdc266-gate,
  html.pjdc266-unlocked #pjdc266-flash{display:none !important;}

  #pjdc266-matrix{position:fixed;inset:0;overflow:hidden;z-index:999997;opacity:0.55;font-family:'Courier New',monospace;}
  .pjdc266-codepanel{position:absolute;font-size:10px;line-height:1.35;color:#1f9e5a;white-space:pre;text-shadow:0 0 6px rgba(31,158,90,0.5);background:rgba(2,8,5,0.55);border:0.5px solid rgba(31,158,90,0.25);border-radius:4px;padding:8px 10px;animation:pjdc266-flicker 4s infinite;}
  .pjdc266-q{position:absolute;font-size:11px;color:#37d67a;white-space:nowrap;text-shadow:0 0 8px rgba(55,214,122,0.6);animation:pjdc266-floatUp linear infinite;opacity:0;}
  @keyframes pjdc266-floatUp{0%{transform:translateY(40px);opacity:0;}10%{opacity:0.9;}85%{opacity:0.9;}100%{transform:translateY(-120px);opacity:0;}}
  @keyframes pjdc266-flicker{0%,100%{opacity:0.85;}48%{opacity:0.85;}50%{opacity:0.35;}52%{opacity:0.85;}}
  #pjdc266-scan{position:fixed;left:0;right:0;height:2px;z-index:999998;background:linear-gradient(90deg,transparent,rgba(55,214,122,0.7),transparent);animation:pjdc266-scanline 5s linear infinite;}
  @keyframes pjdc266-scanline{0%{top:-5%;}100%{top:105%;}}

  #pjdc266-gate{position:fixed;inset:0;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;text-align:center;background:radial-gradient(ellipse at center, rgba(4,10,7,0.55) 0%, rgba(2,5,4,0.86) 100%);font-family:'Courier New',monospace;}
  .pjdc266-crest{width:62px;height:62px;margin-bottom:20px;border-radius:50%;border:2px solid rgba(55,214,122,0.6);display:flex;align-items:center;justify-content:center;color:#37d67a;font-size:26px;box-shadow:0 0 24px rgba(55,214,122,0.35);animation:pjdc266-pulse 2.4s ease-in-out infinite;}
  @keyframes pjdc266-pulse{0%,100%{box-shadow:0 0 18px rgba(55,214,122,0.25);}50%{box-shadow:0 0 34px rgba(55,214,122,0.6);}}
  .pjdc266-seized{font-family:-apple-system,Arial,sans-serif;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#e6edf0;line-height:1.7;max-width:340px;margin-bottom:8px;font-weight:600;}
  .pjdc266-prompt{font-size:13px;color:#9fb3a8;letter-spacing:0.06em;margin-bottom:18px;min-height:20px;}
  .pjdc266-cursor{display:inline-block;width:8px;background:#37d67a;animation:pjdc266-blink 1s steps(1) infinite;}
  @keyframes pjdc266-blink{50%{opacity:0;}}
  .pjdc266-pins{display:flex;gap:12px;margin-bottom:22px;}
  .pjdc266-pin{width:52px;height:64px;border-radius:8px;background:rgba(8,18,12,0.8);border:1px solid rgba(55,214,122,0.35);color:#37d67a;font-size:28px;text-align:center;line-height:64px;caret-color:#37d67a;outline:none;font-family:'Courier New',monospace;transition:border-color 0.2s, box-shadow 0.2s;}
  .pjdc266-pin:focus{border-color:#37d67a;box-shadow:0 0 16px rgba(55,214,122,0.45);}
  .pjdc266-pin.pjdc266-ok{border-color:#37d67a;box-shadow:0 0 20px rgba(55,214,122,0.7);}
  .pjdc266-pin.pjdc266-err{border-color:#ff4d4d;box-shadow:0 0 16px rgba(255,77,77,0.6);animation:pjdc266-shake 0.4s;}
  @keyframes pjdc266-shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
  .pjdc266-status{font-size:11px;letter-spacing:0.1em;min-height:16px;color:#6b7d74;}
  .pjdc266-status.pjdc266-bad{color:#ff6b6b;}
  .pjdc266-status.pjdc266-good{color:#37d67a;}
  .pjdc266-valbar{width:200px;height:3px;margin-top:14px;border-radius:3px;overflow:hidden;background:rgba(55,214,122,0.15);opacity:0;transition:opacity 0.25s;}
  .pjdc266-valbar.pjdc266-on{opacity:1;}
  .pjdc266-valfill{width:0%;height:100%;border-radius:3px;background:linear-gradient(90deg,#1f9e5a,#37d67a);box-shadow:0 0 10px rgba(55,214,122,0.7);}
  #pjdc266-gate.pjdc266-unlocking{animation:pjdc266-gatePulse 0.5s ease-out;}
  @keyframes pjdc266-gatePulse{0%{transform:scale(1);}40%{transform:scale(1.02);}100%{transform:scale(1);}}
  #pjdc266-flash{position:fixed;inset:0;z-index:1000000;background:#dfffe9;opacity:0;pointer-events:none;}
  .pjdc266-foot{position:absolute;bottom:16px;font-size:9px;letter-spacing:0.18em;color:#2f4339;text-transform:uppercase;}
</style>
<script>
  /* Pre-paint unlock check: if this session already entered the PIN, mark the document
     unlocked BEFORE the body renders so the gate never flashes. sessionStorage is wrapped
     because it throws in some privacy modes — on any error we simply leave the gate up. */
  try{ if(sessionStorage.getItem('pjdc266_ok')==='1') document.documentElement.classList.add('pjdc266-unlocked'); }catch(e){}
</script>
</head>
<body>

<!-- ===== PJDC266 PIN gate markup (first in <body> so it paints before the dashboard) ===== -->
<div id="pjdc266-matrix"></div>
<div id="pjdc266-scan"></div>
<div id="pjdc266-gate">
  <div class="pjdc266-crest">⚠</div>
  <div class="pjdc266-seized">A página a que tentou aceder foi apreendida por irregularidades</div>
  <div style="height:18px"></div>
  <div class="pjdc266-prompt" id="pjdc266-prompt"></div>
  <div class="pjdc266-pins" id="pjdc266-pins">
    <input class="pjdc266-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="dígito 1">
    <input class="pjdc266-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="dígito 2">
    <input class="pjdc266-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="dígito 3">
    <input class="pjdc266-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="dígito 4">
  </div>
  <div class="pjdc266-status" id="pjdc266-status">a aguardar autenticação…</div>
  <div class="pjdc266-valbar" id="pjdc266-valbar"><div class="pjdc266-valfill" id="pjdc266-valfill"></div></div>
  <div class="pjdc266-foot">PJDC266 · acesso restrito · sessão monitorizada</div>
</div>
<div id="pjdc266-flash"></div>
<script>
(function(){
  try{
    var html=document.documentElement;
    // Already authenticated this session → head script hid the gate already; do nothing.
    if(html.classList.contains('pjdc266-unlocked')) return;

    /* ---- code panels + floating queries (CSI dressing) ---- */
    var matrix=document.getElementById('pjdc266-matrix');
    var snippets=[
"> TRACE 81.42.* :: PORT 443\nSCAN packet[0x4f] ... OK\nDECRYPT layer/3 ........ 67%\nnode{xrpl}.sync = TRUE\nhash=9af3e1c0b27d",
"SELECT * FROM access_log\n WHERE ip LIKE '194.65.%'\n AND ts > now()-interval'1h';\n>> 412 rows flagged",
"[crawler] indexing assets...\n chunk 0x1a → 0x9c\n entropy 0.88 :: ANOMALY\n routing → forensic queue",
"ssh -i id_rsa root@10.0.*\nauth ........... bypass\npriv-esc ....... granted\ndumping /var/state ...",
"MATCH (n:Wallet)-[:TX]->(m)\n WHERE m.flag='SUSPECT'\n RETURN n.addr, sum(m.val)\n>> compiling subgraph..."
    ];
    var queries=["geolocating origin IP…","cross-referencing case PJDC266…","decrypting TLS handshake…","matching biometric token…","querying interpol node…","tracing TOR exit relay…","parsing ledger 0x4f2a…","flagging anomaly cluster…","compiling evidence hash…"];
    var positions=[{top:'6%',left:'4%'},{top:'12%',right:'4%'},{bottom:'20%',left:'5%'},{bottom:'10%',right:'6%'},{top:'40%',left:'2%'}];
    positions.forEach(function(pos,i){
      var el=document.createElement('div'); el.className='pjdc266-codepanel';
      Object.assign(el.style,pos); el.style.animationDelay=(i*0.5)+'s';
      el.textContent=snippets[i%snippets.length]; matrix.appendChild(el);
    });
    var qTimer=setInterval(function(){
      var q=document.createElement('div'); q.className='pjdc266-q';
      q.textContent='» '+queries[Math.floor(Math.random()*queries.length)];
      q.style.left=(8+Math.random()*60)+'%'; q.style.bottom='-20px';
      q.style.animationDuration=(4+Math.random()*3)+'s';
      matrix.appendChild(q); setTimeout(function(){ q.remove(); },7500);
    },900);

    /* ---- typewriter prompt ---- */
    var promptEl=document.getElementById('pjdc266-prompt');
    var msg='Se é investigador da equipa PJDC266, insira o código pin';
    var idx=0;
    (function type(){
      if(idx<=msg.length){ promptEl.innerHTML=msg.slice(0,idx)+'<span class="pjdc266-cursor">&nbsp;</span>'; idx++; setTimeout(type,38); }
      else { promptEl.innerHTML=msg+'<span class="pjdc266-cursor">&nbsp;</span>'; }
    })();

    /* ---- PIN logic ---- */
    var PIN='0211';
    var pins=[].slice.call(document.querySelectorAll('.pjdc266-pin'));
    var status=document.getElementById('pjdc266-status');

    pins.forEach(function(p,i){
      p.addEventListener('input',function(){
        p.value=p.value.replace(/[^0-9]/g,'');
        if(p.value && i<3) pins[i+1].focus();
        check();
      });
      p.addEventListener('keydown',function(e){
        if(e.key==='Backspace' && !p.value && i>0) pins[i-1].focus();
      });
    });

    function runValidation(){
      var gate=document.getElementById('pjdc266-gate');
      var flash=document.getElementById('pjdc266-flash');
      var valbar=document.getElementById('pjdc266-valbar');
      var valfill=document.getElementById('pjdc266-valfill');
      var scan=document.getElementById('pjdc266-scan');
      var content=[document.querySelector('.wrap'),document.querySelector('.modal-back')].filter(Boolean);

      var steps=[['» a validar credenciais…',22],['» a desencriptar sessão…',55],['» a libertar conteúdo…',82],['✓ ACESSO CONCEDIDO',100]];
      status.className='pjdc266-status pjdc266-good';
      valbar.classList.add('pjdc266-on');
      clearInterval(qTimer);

      var i=0;
      (function next(){
        if(i<steps.length){
          status.textContent=steps[i][0];
          valfill.style.transition='width 0.31s cubic-bezier(.4,0,.2,1)';
          valfill.style.width=steps[i][1]+'%';
          i++; setTimeout(next,300);
        } else {
          gate.classList.add('pjdc266-unlocking');
          flash.style.transition='opacity 0.13s'; flash.style.opacity='0.5';
          setTimeout(function(){ flash.style.opacity='0'; },125);
          // reveal the real dashboard (inline filter overrides the locked-state CSS blur, animates)
          content.forEach(function(el){ el.style.transition='filter 0.77s cubic-bezier(.4,0,.2,1)'; el.style.filter='blur(0) brightness(1)'; el.style.pointerEvents='auto'; });
          [matrix,scan].forEach(function(el){ if(el){ el.style.transition='opacity 0.63s'; el.style.opacity='0'; } });
          gate.style.transition='opacity 0.63s ease';
          setTimeout(function(){ gate.style.opacity='0'; },155);
          setTimeout(function(){
            try{ sessionStorage.setItem('pjdc266_ok','1'); }catch(e){}
            html.classList.add('pjdc266-unlocked');               // consistent end state; hides gate layers
            content.forEach(function(el){ el.style.filter=''; el.style.transition=''; el.style.pointerEvents=''; });
          },840);
        }
      })();
    }

    function check(){
      var code=pins.map(function(p){return p.value;}).join('');
      if(code.length<4){ status.textContent='a aguardar autenticação…'; status.className='pjdc266-status'; return; }
      if(code===PIN){
        pins.forEach(function(p){ p.classList.remove('pjdc266-err'); p.classList.add('pjdc266-ok'); p.blur(); });
        runValidation();
      } else {
        pins.forEach(function(p){ p.classList.add('pjdc266-err'); });
        status.textContent='✗ CÓDIGO INVÁLIDO · tentativa registada';
        status.className='pjdc266-status pjdc266-bad';
        setTimeout(function(){
          pins.forEach(function(p){ p.classList.remove('pjdc266-err'); p.value=''; });
          pins[0].focus();
          status.textContent='a aguardar autenticação…';
          status.className='pjdc266-status';
        },1100);
      }
    }
  }catch(e){
    // Fail-safe: a gag must never lock anyone out over a script error — reveal the site.
    try{ document.documentElement.classList.add('pjdc266-unlocked'); }catch(_){}
  }
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script>
(function(){
  "use strict";
  var CFG = window.BESTBUY_CONFIG || {};
  var SB_URL = CFG.SUPABASE_URL, SB_KEY = CFG.SUPABASE_ANON_KEY;

  // Register the zoom/pan plugin if its CDN loaded. If it didn't, the chart still
  // works (unknown plugin options are ignored) and double-tap-to-fit still works.
  try {
    var ZP = window.ChartZoom && (window.ChartZoom.default || window.ChartZoom);
    if (window.Chart && ZP && Chart.registry && !Chart.registry.plugins.get('zoom')) Chart.register(ZP);
  } catch (e) {}

  var RANGES = [
    {k:'7d',days:7},{k:'15d',days:15},{k:'30d',days:30},{k:'60d',days:60},
    {k:'90d',days:90},{k:'6m',days:182},{k:'1y',days:365},{k:'all',days:null}
  ];
  var DEFAULT_RANGE = '30d';
  var GOOD_ZONE = 65;   // % percentile — BUY zone (green) at the top of the chart
  var SELL_ZONE = 35;   // % percentile — SELL zone (red) at the bottom, mirror of BUY

  var PILLAR_DEFS = [
    {key:'fundamentals', icon:'ti-building-bank', on:'#6399ed', off:'#2c3a52'},
    {key:'technicals',   icon:'ti-chart-candle',  on:'#a78bfa', off:'#3a3357'},
    {key:'activity',     icon:'ti-activity',       on:'#34d399', off:'#1f3a2e'}
  ];
  var PILLAR_W = { fundamentals:45, technicals:35, activity:20 };

  var state = { tokens:[], readingsByToken:{}, signalsByToken:{}, range:DEFAULT_RANGE, hidden:{}, openRow:null, chart:null,
    pillars:{ fundamentals:true, technicals:true, activity:true } };

  // Blend a reading from its stored pillar scores over the currently-active pillars.
  // Mirrors the server blend: null pillars drop and weights renormalize. Returns 0–10.
  function blendRow(r){
    var total=0, wsum=0;
    PILLAR_DEFS.forEach(function(p){
      if(!state.pillars[p.key]) return;
      var v=r['score_'+p.key];
      if(v==null) return;
      total += PILLAR_W[p.key]*Number(v); wsum += PILLAR_W[p.key];
    });
    return wsum===0 ? null : total/wsum;
  }

  // ── Historical percentile (chart line) ────────────────────────────────────────
  // The chart plots each token's score as its PERCENTILE against that token's OWN
  // COMPLETE, FIXED history — never the visible window. So a given day's plotted
  // value is identical at every range/zoom/isolation (no "wiggle in the past"); the
  // window only changes WHICH points are shown, never their value. Best day → 100,
  // worst → 0, median → ~50. The absolute score is unchanged and still drives the list.
  function tokenSortedScores(tid){
    var a=(state.readingsByToken[tid]||[]).map(function(r){ return blendRow(r); })
          .filter(function(v){ return v!=null; });
    a.sort(function(x,y){ return x-y; });
    return a;
  }
  function percentileOf(sorted, v){
    if(v==null || sorted.length===0) return null;
    if(sorted.length===1) return 50;
    var lo=0, hi=sorted.length;                 // upper bound: count of values ≤ v
    while(lo<hi){ var m=(lo+hi)>>1; if(sorted[m]<=v) lo=m+1; else hi=m; }
    return Math.max(0, Math.min(100, (lo-1)/(sorted.length-1)*100));  // best→100, worst→0
  }

  // ── helpers ─────────────────────────────────────────────────────────────────
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
  function r1(n){ return n==null||isNaN(n)?null:Math.round(n*10)/10; }
  function fmtScore(n){ return n==null?'—':n.toFixed(1); }
  function fmtNum(n,d){ if(n==null||isNaN(n))return 'n/a'; return Number(n).toFixed(d==null?2:d); }
  function fmtUsd(n){
    if(n==null||isNaN(n))return 'n/a';
    var a=Math.abs(n);
    if(a>=1e9)return '$'+(n/1e9).toFixed(2)+'B';
    if(a>=1e6)return '$'+(n/1e6).toFixed(2)+'M';
    if(a>=1e3)return '$'+(n/1e3).toFixed(1)+'K';
    return '$'+n.toFixed(2);
  }
  function fmtPct(n){ if(n==null||isNaN(n))return 'n/a'; return (n*100).toFixed(1)+'%'; }
  function verdict(s){
    if(s==null) return {label:'N/A',good:false};
    if(s>=8.0) return {label:'STRONG BUY',good:true};
    if(s>=6.5) return {label:'BUY',good:true};
    if(s>=4.5) return {label:'NEUTRAL',good:false};
    if(s>=3.0) return {label:'WEAK',good:false};
    return {label:'AVOID',good:false};
  }

  function sbGet(path){
    return fetch(SB_URL+'/rest/v1/'+path, {headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY}})
      .then(function(r){ if(!r.ok) throw new Error('Supabase '+r.status); return r.json(); });
  }
  // Paged fetch: PostgREST caps each response at db-max-rows (1000 on this project),
  // and a `limit` param can't exceed that cap — so we page with limit/offset until a
  // short page signals the end. Pass `path` WITHOUT limit/offset.
  function sbGetAll(path){
    var PAGE=1000, all=[];
    var sep = path.indexOf('?')>=0 ? '&' : '?';
    function page(offset){
      return sbGet(path+sep+'limit='+PAGE+'&offset='+offset).then(function(rows){
        all=all.concat(rows);
        if(rows.length<PAGE) return all;
        return page(offset+PAGE);
      });
    }
    return page(0);
  }
  function sbPost(table, body){
    return fetch(SB_URL+'/rest/v1/'+table, {method:'POST',
      headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal'},
      body:JSON.stringify(body)}).then(function(r){ if(!r.ok) throw new Error('insert '+r.status); });
  }
  function sbPatch(path, body){
    return fetch(SB_URL+'/rest/v1/'+path, {method:'PATCH',
      headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal'},
      body:JSON.stringify(body)}).then(function(r){ if(!r.ok) throw new Error('update '+r.status); });
  }

  // ── data load ───────────────────────────────────────────────────────────────
  function load(){
    if(!SB_URL || SB_URL.indexOf('__')===0){
      document.getElementById('ranklist').innerHTML =
        '<div class="err">Supabase not configured. Fill in <b>public/config.js</b> with your project URL + anon key.</div>';
      return;
    }
    Promise.all([
      sbGet('tracked_tokens?active=eq.true&select=*&order=created_at.asc'),
      sbGetAll('score_readings?select=*&order=fetched_at.asc'),
      sbGet('signals?select=*&order=signal_date.asc').catch(function(){ return []; })
    ]).then(function(res){
      state.tokens = res[0];
      var byTok = {};
      res[1].forEach(function(row){ (byTok[row.token_id]=byTok[row.token_id]||[]).push(row); });
      state.readingsByToken = byTok;
      var sigTok = {};
      (res[2]||[]).forEach(function(s){ (sigTok[s.token_id]=sigTok[s.token_id]||[]).push(s); });
      state.signalsByToken = sigTok;
      renderAll();
    }).catch(function(e){
      document.getElementById('ranklist').innerHTML = '<div class="err">Failed to load: '+e.message+'</div>';
    });
  }

  function latestOf(tid){ var a=state.readingsByToken[tid]; return a&&a.length?a[a.length-1]:null; }
  function prevOf(tid){ var a=state.readingsByToken[tid]; return a&&a.length>1?a[a.length-2]:null; }

  // ── header ──────────────────────────────────────────────────────────────────
  function renderHeader(){
    var newest=null;
    Object.keys(state.readingsByToken).forEach(function(tid){
      var l=latestOf(tid); if(l && (!newest || l.fetched_at>newest)) newest=l.fetched_at;
    });
    var d = newest? new Date(newest): new Date();
    document.getElementById('dateline').textContent =
      d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})+' · 3 readings/day';
    var today = new Date(); var isToday = newest &&
      d.getUTCFullYear()===today.getUTCFullYear() && d.getUTCMonth()===today.getUTCMonth() && d.getUTCDate()===today.getUTCDate();
    document.getElementById('livedot').className = 'dot'+(isToday?' on':'');
    document.getElementById('livetext').textContent = isToday?'updated today':'updated '+d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  }

  // ── ranges ──────────────────────────────────────────────────────────────────
  function renderRanges(){
    var box=document.getElementById('ranges'); box.innerHTML='';
    RANGES.forEach(function(rg){
      var b=el('button','range-btn'+(rg.k===state.range?' active':''),rg.k);
      b.onclick=function(){ state.range=rg.k; renderRanges(); renderChart(); };
      box.appendChild(b);
    });
  }
  function rangeCutoff(){
    var rg=RANGES.filter(function(r){return r.k===state.range;})[0];
    if(!rg||rg.days==null) return null;
    return Date.now()-rg.days*86400000;
  }

  // ── chart ───────────────────────────────────────────────────────────────────
  // BUY zone (green, top) + mirrored SELL zone (red, bottom) on the percentile axis.
  var greenZonePlugin = {
    id:'zones',
    beforeDatasetsDraw:function(chart){
      var ctx=chart.ctx, ca=chart.chartArea, y=chart.scales.y;
      if(!ca||!y) return;
      // shaded band between two percentile levels, fading away from the boundary,
      // plus a dotted boundary line. `dir`=-1 fades upward (BUY), +1 downward (SELL).
      function band(fromPct, toPct, rgb, dir){
        var pHi=y.getPixelForValue(Math.max(fromPct,toPct)), pLo=y.getPixelForValue(Math.min(fromPct,toPct));
        var top=Math.max(ca.top,pHi), base=Math.min(ca.bottom,pLo);
        if(base>top){
          var g=ctx.createLinearGradient(0, dir<0?pHi:pLo, 0, dir<0?pLo:pHi);
          g.addColorStop(0,'rgba('+rgb+',0.30)');
          g.addColorStop(0.45,'rgba('+rgb+',0.13)');
          g.addColorStop(1,'rgba('+rgb+',0.02)');
          ctx.save(); ctx.fillStyle=g; ctx.fillRect(ca.left,top,ca.right-ca.left,base-top); ctx.restore();
        }
      }
      function dottedAt(pct, rgb){
        if(pct<y.min||pct>y.max) return;
        var yp=y.getPixelForValue(pct);
        ctx.save(); ctx.beginPath(); ctx.setLineDash([2,3]); ctx.lineWidth=1;
        ctx.strokeStyle='rgba('+rgb+',0.32)'; ctx.moveTo(ca.left,yp); ctx.lineTo(ca.right,yp); ctx.stroke(); ctx.restore();
      }
      // BUY (green) from GOOD_ZONE up to 100, fading up toward the top.
      if(GOOD_ZONE < y.max){ band(GOOD_ZONE, 100, '34,197,94', -1); dottedAt(GOOD_ZONE, '34,197,94'); }
      // SELL (red) from 0 up to SELL_ZONE, fading down toward the floor.
      if(SELL_ZONE > y.min){ band(0, SELL_ZONE, '248,113,113', 1); dottedAt(SELL_ZONE, '248,113,113'); }
    }
  };

  // (Discrete BUY/SELL triangle markers were removed — the percentile line itself is
  // the read: top = buy zone, bottom = sell zone. The `signals` table is kept in the
  // DB but no longer drawn on the chart.)

  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dualAxisPlugin = {
    id:'dualAxis',
    afterDraw:function(chart){
      var ctx=chart.ctx, ca=chart.chartArea, x=chart.scales.x;
      if(!ca||!x) return;
      var min=x.min, max=x.max;
      if(min==null||max==null) return;
      var spanDays=(max-min)/86400000;
      ctx.save();
      ctx.textAlign='center';
      var yT1=ca.bottom+15, yT2=ca.bottom+30;

      if(spanDays<=75){
        // ── short ranges: day-of-month on top tier, month + year below ──
        var d0=new Date(min);
        var base=Date.UTC(d0.getUTCFullYear(),d0.getUTCMonth(),d0.getUTCDate());
        var step = spanDays<=10?1 : spanDays<=20?2 : spanDays<=35?3 : 7;
        var first=base; if(first<min) first+=86400000;
        var lastPx=-999;
        for(var t=first, g=0; t<=max && g<400; t+=86400000, g++){
          var dayIdx=Math.round((t-base)/86400000);
          if(dayIdx%step!==0) continue;
          var px=x.getPixelForValue(t);
          if(px<ca.left-2||px>ca.right+2||px-lastPx<18) continue;
          ctx.font='10px -apple-system,sans-serif';
          ctx.fillStyle='#71717a';
          ctx.fillText(String(new Date(t).getUTCDate()), px, yT1);
          lastPx=px;
        }
        // month + year band: at range start and each month boundary
        var mMarks=[{t:min, m:d0.getUTCMonth(), y:d0.getUTCFullYear()}];
        var mm=new Date(Date.UTC(d0.getUTCFullYear(),d0.getUTCMonth()+1,1));
        for(var g2=0; mm.getTime()<=max && g2<12; g2++){
          mMarks.push({t:mm.getTime(), m:mm.getUTCMonth(), y:mm.getUTCFullYear()});
          mm=new Date(Date.UTC(mm.getUTCFullYear(),mm.getUTCMonth()+1,1));
        }
        var lastMpx=-999;
        mMarks.forEach(function(mk){
          var px=x.getPixelForValue(mk.t);
          if(px<ca.left-2||px>ca.right+2||px-lastMpx<48) return;
          ctx.font='700 10px -apple-system,sans-serif';
          ctx.fillStyle='#a1a1aa';
          ctx.fillText(MON[mk.m]+' '+mk.y, px, yT2);
          lastMpx=px;
        });
      } else {
        // ── long ranges: month names on top tier, year (bold) below ──
        var d=new Date(min); var marks=[];
        var cur=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),1));
        if(cur.getTime()<min) cur=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,1));
        for(var gg=0; cur.getTime()<=max && gg<60; gg++){
          marks.push(new Date(cur));
          cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+1,1));
        }
        var lastYearPx=-999;
        marks.forEach(function(m,i){
          var px=x.getPixelForValue(m.getTime());
          if(px<ca.left-2||px>ca.right+2) return;
          ctx.font='11px -apple-system,sans-serif';
          ctx.fillStyle='#a1a1aa';
          ctx.fillText(MON[m.getUTCMonth()],px,yT1);
          var isYearBoundary = m.getUTCMonth()===0 || i===0;
          if(isYearBoundary && px-lastYearPx>30){
            ctx.font='700 11px -apple-system,sans-serif';
            ctx.fillStyle='#f4f4f5';
            ctx.fillText(String(m.getUTCFullYear()),px,yT2);
            lastYearPx=px;
          }
        });
      }
      ctx.restore();
    }
  };

  // ── pillar toggle icons ───────────────────────────────────────────────────────
  var PILLAR_LABEL = { fundamentals:'Fundamentals', technicals:'Technicals', activity:'Atividade' };
  function renderPillars(){
    var box=document.getElementById('pillars'); box.innerHTML='';
    PILLAR_DEFS.forEach(function(p){
      var on=!!state.pillars[p.key];
      var i=el('i','pillar-ico ti '+p.icon);
      i.style.color = on ? p.on : p.off;
      i.title = PILLAR_LABEL[p.key]+(on?'':' (desligado)');
      i.onclick=function(){ state.pillars[p.key]=!state.pillars[p.key]; renderPillars(); renderChart(); renderRankList(); };
      box.appendChild(i);
    });
  }

  function renderChart(){
    var cutoff=rangeCutoff();
    // Bound the x-axis explicitly so it never sprawls into random future years when
    // no points are visible (all tokens hidden, or an empty range). max = now; min =
    // the range cutoff, or — for "all" — the earliest reading we have.
    var nowMs=Date.now(), earliest=Infinity;
    Object.keys(state.readingsByToken).forEach(function(tid){
      (state.readingsByToken[tid]||[]).forEach(function(r){
        var ms=new Date(r.fetched_at).getTime(); if(ms<earliest) earliest=ms;
      });
    });
    var xMin = cutoff!=null ? cutoff : (earliest!==Infinity ? earliest : nowMs-30*86400000);
    var xMax = nowMs;
    var datasets=state.tokens.map(function(t){
      var sorted=tokenSortedScores(t.id);   // FULL fixed history → percentile is window-invariant
      var rows=(state.readingsByToken[t.id]||[]).filter(function(r){
        var ms=new Date(r.fetched_at).getTime();
        return cutoff==null || ms>=cutoff;
      });
      return {
        label:t.symbol,
        tokenId:t.id,
        borderColor:t.color,
        backgroundColor:t.color,
        borderWidth:2,
        // y = historical percentile (0–100) of the day's absolute score vs this token's
        // whole history; `abs` keeps the underlying absolute score for the hover.
        data:rows.map(function(r){
               var abs=blendRow(r), pct=percentileOf(sorted, abs);
               return {x:new Date(r.fetched_at).getTime(), y:pct==null?null:Math.round(pct*10)/10, abs:abs};
             }).filter(function(p){ return p.y!=null; }),
        tension:0.4, pointRadius:0, pointHitRadius:8, spanGaps:true, hidden:!!state.hidden[t.id]
      };
    });

    if(state.chart) state.chart.destroy();
    var ctx=document.getElementById('chart').getContext('2d');
    state.chart=new Chart(ctx,{
      type:'line',
      data:{datasets:datasets},
      options:{
        animation:false, responsive:true, maintainAspectRatio:false,
        layout:{padding:{bottom:34, top:4, left:2, right:6}},
        interaction:{mode:'nearest',intersect:false},
        scales:{
          x:{ type:'linear', min:xMin, max:xMax, grid:{display:false},
              ticks:{display:false}, border:{display:false} },
          y:{ min:0, max:100, grid:{color:'rgba(255,255,255,0.05)'},
              border:{display:false},
              ticks:{color:'#52525b', stepSize:20, font:{size:10}, callback:function(v){ return Math.round(v)+'%'; } } }
        },
        plugins:{
          legend:{display:false},
          tooltip:{
            enabled:true,   // shows the historical percentile AND the absolute score
            backgroundColor:'#15171f', borderColor:'#1e2130', borderWidth:1,
            titleColor:'#a1a1aa', bodyColor:'#f4f4f5', padding:10, displayColors:true,
            callbacks:{
              title:function(items){ return new Date(items[0].parsed.x).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); },
              label:function(it){ var abs=it.raw&&it.raw.abs; return it.dataset.label+' · percentil '+Math.round(Number(it.parsed.y))+'% · score '+(abs==null?'—':Number(abs).toFixed(1)); }
            }
          },
          // Pinch (mobile) / wheel (desktop) zoom + drag-pan on both axes. Constrained
          // so you can't pan past the loaded data or zoom the y-axis past 0–100%.
          zoom:{
            limits:{ x:{min:'original', max:'original'}, y:{min:0, max:100, minRange:3} },
            pan:{ enabled:true, mode:'xy' },
            zoom:{ wheel:{enabled:true}, pinch:{enabled:true}, mode:'xy' }
          }
        }
      },
      plugins:[greenZonePlugin, dualAxisPlugin]
    });
  }

  // ── legend chips ──────────────────────────────────────────────────────────────
  function renderLegend(){
    var box=document.getElementById('legend'); box.innerHTML='';
    // Eye toggle before the first token: open = all selected, closed = chart cleared.
    var allVisible = state.tokens.length>0 && state.tokens.every(function(t){ return !state.hidden[t.id]; });
    var eye=el('i','legend-eye ti '+(allVisible?'ti-eye':'ti-eye-off'));
    eye.title = allVisible ? 'Limpar gráfico (esconder todos)' : 'Selecionar todos';
    eye.onclick=function(){
      var hideAll = allVisible;                 // if everything is shown, clear; else select all
      state.tokens.forEach(function(t){ state.hidden[t.id]=hideAll; });
      renderLegend(); renderChart();
    };
    box.appendChild(eye);
    state.tokens.forEach(function(t){
      var chip=el('span','chip'+(state.hidden[t.id]?' off':''));
      var sw=el('span','swatch'); sw.style.background=t.color; chip.appendChild(sw);
      chip.appendChild(el('span',null,t.symbol));
      chip.onclick=function(){ state.hidden[t.id]=!state.hidden[t.id]; renderLegend(); renderChart(); };
      box.appendChild(chip);
    });
  }

  // ── ranked list + expand ──────────────────────────────────────────────────────
  // reading-panel field definitions; higherBetter drives the ▲/▼ improved colour.
  // Which value metric each category is scored on (drives the expand-panel label).
  var FUND_CATEGORY = {
    defi:'tvl-rev', rwa:'tvl-rev', yield:'rev-tvl',
    'ai-agent':'rev', infra:'rev', l1:'chain-fees',
    payment:'none', uncovered:'none'
  };
  function readingFields(latest, prev, token){
    function delta(curKey, higherBetter){
      var cur=latest[curKey], pr=prev?prev[curKey]:null;
      if(cur==null||pr==null||isNaN(cur)||isNaN(pr)||Number(pr)===0) return {txt:'n/a',cls:'na'};
      var pct=(Number(cur)-Number(pr))/Math.abs(Number(pr))*100;
      if(Math.abs(pct)<0.05) return {txt:'0.0%',cls:'na'};
      var improved = higherBetter ? pct>0 : pct<0;
      var arrow = pct>0?'▲':'▼';
      return {txt:arrow+' '+Math.abs(pct).toFixed(1)+'%', cls:improved?'up':'down'};
    }
    // Category-aware Fundamentals metric. The value metric (TVL / revenue / chain
    // fees) is chosen by the token's category and normalized via a valuation
    // multiple (MC ÷ annual value). payment/uncovered have no honest source.
    var cat = (token && token.category) || 'defi';
    var kind = FUND_CATEGORY[cat] || 'tvl-rev';
    var rev = latest.holders_revenue, tvl = latest.tvl;
    var mcap = (latest.price!=null && latest.circ_supply!=null) ? Number(latest.price)*Number(latest.circ_supply) : null;
    var mult = (mcap!=null && rev!=null && Number(rev)>0) ? Math.round(mcap/Number(rev)) : null;
    var multTxt = mult!=null ? ' · '+mult+'x' : '';
    var revVal = (rev==null) ? 'a recolher' : fmtUsd(rev)+multTxt;
    var fund;
    if(kind==='none'){
      fund=[{k:'Fundamentals', val:'sem cobertura', d:{txt:'Technicals + Atividade', cls:'na'}}];
    } else if(kind==='chain-fees'){
      fund=[{k:'Chain fees (ann.)', val:revVal, d:delta('holders_revenue',true)}];
    } else if(kind==='rev'){
      fund=[{k:'Receita (ann.)', val:revVal, d:delta('holders_revenue',true)}];
    } else if(kind==='rev-tvl'){
      fund=[{k:'Receita (ann.)', val:revVal, d:delta('holders_revenue',true)},
            {k:'TVL', val:fmtUsd(tvl), d:delta('tvl',true)}];
    } else { // tvl-rev (defi/rwa)
      fund=[{k:'TVL', val:fmtUsd(tvl), d:delta('tvl',true)},
            {k:'Receita (ann.)', val:revVal, d:delta('holders_revenue',true)}];
    }
    return [
      {k:'Price vs MAs',        val:fmtScore(r1(latest.score_price_ma)), d:delta('score_price_ma',true)},
      {k:'Below 1-year high',    val:fmtScore(r1(latest.score_below_high)), d:delta('score_below_high',true)},
      {k:'RSI (14d)',           val:fmtNum(latest.rsi_14,1), d:delta('rsi_14',false)}
    ].concat(fund).concat([
      {k:'Inflation (annual)',  val:latest.emissions_rate==null?'n/a':fmtPct(latest.emissions_rate)+' / yr', d:delta('emissions_rate',false)},
      {k:'Endereços ativos',    val:fmtCount(latest.active_addresses), d:delta('active_addresses',true)},
      {k:'Holders (on-chain)',  val:fmtCount(latest.holder_count),     d:delta('holder_count',true)},
      {k:'Transferências',      val:fmtCount(latest.transfer_count),   d:delta('transfer_count',true)}
    ]);
  }
  // On-chain counts: "a recolher" while empty (live-only, accumulating) — never 0.
  function fmtCount(n){ return (n==null||isNaN(n))?'a recolher':Number(n).toLocaleString('pt-PT'); }

  function fmtPrice(n){
    if(n==null||isNaN(n)) return '';
    n=Number(n);
    if(n>=1000) return '$'+n.toLocaleString(undefined,{maximumFractionDigits:0});
    if(n>=1) return '$'+n.toFixed(2);
    return '$'+n.toFixed(n<0.1?4:3);
  }
  function verdictColor(s){ return s==null?'#a1a1aa': s>=6.5?'#34d399': s>=4.5?'#a1a1aa':'#f87171'; }
  var PILLAR_BAR = { fundamentals:'#6399ed', technicals:'#a78bfa', activity:'#34d399' };

  function renderRankList(){
    var box=document.getElementById('ranklist'); box.innerHTML='';
    var ranked=state.tokens.map(function(t){ var l=latestOf(t.id); return {t:t, l:l, b:l?blendRow(l):null}; })
      .filter(function(x){ return x.l && x.b!=null; })
      .sort(function(a,b){ return b.b-a.b; });

    if(!ranked.length){ box.appendChild(el('div','empty','No readings for the selected pillars.')); return; }

    ranked.forEach(function(x,idx){
      var t=x.t, latest=x.l, prev=prevOf(t.id), blended=x.b;
      var pct=Math.max(0,Math.min(100,blended*10));
      var row=el('div','row'+(state.openRow===t.id?' open':''));
      row.style.borderLeftColor=t.color;

      var btn=el('button','row-btn');
      btn.appendChild(el('span','rank-num',String(idx+1)));
      var tok=el('div','tok');
      tok.appendChild(el('div','sym',t.symbol));
      var nm=el('div','nm');
      nm.appendChild(document.createTextNode(t.name+' · '));
      nm.appendChild(el('span','price',fmtPrice(latest.price)));
      tok.appendChild(nm);
      if(latest.reweighted){
        var noCov = (t.category==='payment' || t.category==='uncovered');
        tok.appendChild(el('div','flag', noCov
          ? 'sem cobertura de Fundamentals · Technicals + Atividade'
          : 'market-only · sem dados de Fundamentals'));
      }
      btn.appendChild(tok);

      var bar=el('div','score-bar'); var fill=el('span'); fill.style.width=pct+'%'; bar.appendChild(fill); btn.appendChild(bar);

      var sw=el('div','score-wrap');
      var sc=el('div','score',blended.toFixed(1)); sc.style.color=verdictColor(blended); sw.appendChild(sc);
      var vd=el('div','verdict',verdict(blended).label); vd.style.color=verdictColor(blended); sw.appendChild(vd);
      btn.appendChild(sw);

      var chev=el('span','chev','⌄'); chev.style.fontSize='18px'; btn.appendChild(chev);
      btn.onclick=function(){ state.openRow = state.openRow===t.id?null:t.id; renderRankList(); };
      row.appendChild(btn);

      // expand panel — two columns (readings | pillars), stacking on narrow mobile
      var panel=el('div','panel');
      var inner=el('div','panel-inner');
      var cols=el('div','panel-cols');

      var left=el('div','panel-readings');
      readingFields(latest, prev, t).forEach(function(f){
        var r=el('div','reading');
        r.appendChild(el('div','k',f.k));
        var vbox=el('div','v');
        vbox.appendChild(el('span','val',f.val));
        vbox.appendChild(el('span','delta '+f.d.cls,f.d.txt));
        r.appendChild(vbox);
        left.appendChild(r);
      });
      left.appendChild(el('div','foot','Δ vs previous reading (last 8h)'));
      cols.appendChild(left);

      var right=el('div','panel-pillars');
      var mini=el('div','pillars-mini');
      mini.appendChild(el('h4',null,'PILLARS'));
      [{key:'fundamentals',lab:'Fundamentals'},{key:'technicals',lab:'Technicals'},{key:'activity',lab:'Atividade'}].forEach(function(p){
        var val=latest['score_'+p.key];
        var pm=el('div','pmini');
        var head=el('div','pmini-head');
        head.appendChild(el('span','lab',p.lab));
        head.appendChild(el('span','pv',val==null?(p.key==='activity'?'a recolher':'n/a'):Number(val).toFixed(1)));
        pm.appendChild(head);
        if(val==null && p.key==='activity'){
          pm.appendChild(el('div','pmini-off','recolha on-chain a iniciar'));
        } else {
          var tr=el('div','ptrack'); var fl=el('span');
          fl.style.width=(val==null?0:Math.max(0,Math.min(100,Number(val)*10)))+'%';
          fl.style.background=PILLAR_BAR[p.key];
          tr.appendChild(fl); pm.appendChild(tr);
        }
        mini.appendChild(pm);
      });
      right.appendChild(mini);
      cols.appendChild(right);

      inner.appendChild(cols);
      panel.appendChild(inner);
      row.appendChild(panel);
      box.appendChild(row);

      if(state.openRow===t.id){ requestAnimationFrame(function(){ panel.style.maxHeight=inner.scrollHeight+'px'; }); }
    });
  }

  // ── manage tokens ──────────────────────────────────────────────────────────
  function renderManage(){
    var sel=document.getElementById('manage-select');
    sel.innerHTML='';
    sel.appendChild(new Option('Manage tokens…',''));
    state.tokens.forEach(function(t){ sel.appendChild(new Option('Remove '+t.symbol+' (keeps history)', 'rm:'+t.id)); });
    sel.appendChild(new Option('+ add new token','add'));
    sel.onchange=function(){
      var val=sel.value; sel.value='';
      if(val==='add') return addToken();
      if(val.indexOf('rm:')===0){
        var id=val.slice(3); var t=state.tokens.filter(function(x){return x.id===id;})[0];
        if(t && confirm('Stop tracking '+t.symbol+'? History is kept; it just stops updating.')){
          sbPatch('tracked_tokens?id=eq.'+id, {active:false}).then(load).catch(function(e){ alert('Failed: '+e.message); });
        }
      }
    };
    document.getElementById('add-btn').onclick=addToken;
  }
  function addToken(){
    var symbol=prompt('Token symbol (e.g. AERO):'); if(!symbol) return;
    var cg=prompt('CoinGecko id (e.g. aerodrome-finance):'); if(!cg) return;
    var slug=prompt('DefiLlama slug (optional — leave blank for market-only):')||null;
    var color=prompt('Hex color (optional, e.g. #22d3ee):')||'#22d3ee';
    var name=prompt('Display name (optional):')||symbol;
    var sym=symbol.toUpperCase().trim();
    sbPost('tracked_tokens', [{symbol:sym, name:name.trim(),
      coingecko_id:cg.trim(), defillama_slug:slug?slug.trim():null, color:color.trim()}])
      .then(function(){
        // Auto-seed 12 months of history for the new token (one token → no rate
        // limit). Runs server-side; safe endpoint that only seeds zero-history tokens.
        alert(sym+' added. Seeding 12 months of history — this can take ~20s, then the chart will fill in.');
        return fetch('/api/backfill-token', {method:'POST'}).catch(function(){ return null; });
      })
      .then(function(){ load(); })
      .catch(function(e){ alert('Failed to add: '+e.message); });
  }

  // ── Excel export — full raw archive, one sheet per token + consolidated ───────
  // Honesty: every score's RAW inputs and the time-aligned price go in each row, so
  // the series can be analysed later (e.g. Activity-vs-Price correlation). Activity
  // cells are left BLANK (never 0) wherever there is no on-chain snapshot, and the
  // Legenda sheet states the exact date Activity collection began.
  var XLS_COLS = ['Data/hora','Tipo','Preço','Score Final','Fundamentals','Technicals','Atividade',
    'TVL','Holders Revenue','Emissões %','MA50','MA200','RSI','Dist. do mínimo %',
    'Endereços ativos','Holders','Transferências'];

  function numOrBlank(v){ return (v==null||v===''||isNaN(Number(v))) ? null : Number(v); }
  function rnd(v,d){ var n=numOrBlank(v); return n==null?null:Math.round(n*Math.pow(10,d))/Math.pow(10,d); }
  function priceRound(v){ var n=numOrBlank(v); if(n==null) return null;
    var a=Math.abs(n); return a>=1000?Math.round(n):a>=1?rnd(n,4):rnd(n,6); }

  // Map one reading → a row array aligned to XLS_COLS. Activity raw stays blank (null)
  // when absent so empty ≠ zero. `prefix` optionally prepends the Token column.
  function readingToRow(r, prefix){
    var row = [
      new Date(r.fetched_at),
      r.source_tier || (r.is_backfill?'backfill':'live'),
      priceRound(r.price),
      rnd(r.final_score,1), rnd(r.score_fundamentals,1), rnd(r.score_technicals,1), rnd(r.score_activity,1),
      numOrBlank(r.tvl), numOrBlank(r.holders_revenue),
      r.emissions_rate==null?null:rnd(Number(r.emissions_rate)*100,2),
      numOrBlank(r.ma_50), numOrBlank(r.ma_200), rnd(r.rsi_14,1),
      r.dist_from_low_pct==null?null:rnd(Number(r.dist_from_low_pct)*100,1),
      numOrBlank(r.active_addresses), numOrBlank(r.holder_count), numOrBlank(r.transfer_count)
    ];
    return prefix==null ? row : [prefix].concat(row);
  }

  function sortedReadings(tid){
    return (state.readingsByToken[tid]||[]).slice()
      .sort(function(a,b){ return new Date(a.fetched_at)-new Date(b.fetched_at); });
  }

  // Earliest timestamp at which any on-chain activity was actually recorded (date X).
  function activityStartDate(){
    var min=null;
    state.tokens.forEach(function(t){
      (state.readingsByToken[t.id]||[]).forEach(function(r){
        if(r.active_addresses!=null||r.holder_count!=null||r.transfer_count!=null){
          var ms=new Date(r.fetched_at).getTime();
          if(min==null||ms<min) min=ms;
        }
      });
    });
    return min;
  }

  function makeSheet(aoa, withToken){
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    var widths=(withToken?[{wch:9}]:[]).concat(
      [{wch:17},{wch:9},{wch:12},{wch:10},{wch:12},{wch:11},{wch:11},
       {wch:15},{wch:15},{wch:11},{wch:12},{wch:12},{wch:8},{wch:15},
       {wch:14},{wch:12},{wch:14}]);
    ws['!cols']=widths;
    ws['!autofilter']={ref:XLSX.utils.encode_range({s:{r:0,c:0},e:{r:Math.max(1,aoa.length-1),c:(withToken?XLS_COLS.length:XLS_COLS.length-1)}})};
    return ws;
  }

  function legendSheet(startMs){
    var X = startMs==null ? null : new Date(startMs);
    var xTxt = X==null
      ? 'AINDA NÃO COMEÇOU — não há registos de Atividade live até à data deste ficheiro.'
      : ('começa em ' + ptDate(X.toISOString()) + ' (' + X.toISOString().slice(0,10) + ').');
    var L=[
      ['Compro o quê?! — arquivo de dados'],
      [''],
      ['IMPORTANTE — leia antes de analisar:'],
      ['Fundamentals, Technicals e Preço têm ~1 ANO de histórico (reconstruído).'],
      ['A coluna ATIVIDADE (on-chain) ' + xTxt],
      ['Antes dessa data as células de Atividade estão VAZIAS (não é zero — é "sem dado").'],
      ['Para correlacionar Atividade vs Preço, use APENAS as linhas a partir dessa data;'],
      ['caso contrário estará a comparar preço real com células vazias e a tirar conclusões falsas.'],
      [''],
      ['Tipo de cada linha:'],
      ['  backfill = reconstruído de dados históricos (1 ponto/dia).'],
      ['  live = recolhido ao vivo no momento (3x/dia).'],
      [''],
      ['O que cada coluna significa:'],
      ['  Preço — preço USD no momento da leitura (eixo para correlação).'],
      ['  Score Final — nota 0–10 (mistura Fundamentals 45% / Technicals 35% / Atividade 20%).'],
      ['  Fundamentals — métrica de valor por categoria (TVL+receita p/ DeFi/RWA, receita p/ AI/infra,'],
      ['    chain-fees p/ L1s) normalizada por múltiplo de avaliação (MC÷valor) + emissões. payment/'],
      ['    uncovered não têm cobertura → pontuados só por Technicals + Atividade.'],
      ['  Technicals — preço vs médias, distância ao topo de 1 ano, RSI.'],
      ['  Atividade — adoção on-chain: endereços ativos, crescimento de holders, transferências.'],
      ['  TVL — valor depositado no protocolo (USD).'],
      ['  Holders Revenue — receita anualizada (USD).'],
      ['  Emissões % — inflação anual da oferta (mais baixo é melhor).'],
      ['  MA50 / MA200 — médias móveis do preço.'],
      ['  RSI — força relativa (0–100; <30 barato, >70 esticado).'],
      ['  Dist. do mínimo % — quanto o preço está acima do mínimo de 1 ano.'],
      ['  Endereços ativos / Holders / Transferências — métricas on-chain cruas (só live).'],
      [''],
      ['Gerado em ' + new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC.'],
      ['Isto não é aconselhamento financeiro.']
    ];
    var ws=XLSX.utils.aoa_to_sheet(L);
    ws['!cols']=[{wch:95}];
    return ws;
  }

  function exportExcel(){
    if(typeof XLSX==='undefined'){ alert('Biblioteca Excel ainda a carregar — tente novamente num instante.'); return; }
    var btn=document.getElementById('export-btn'); var note=document.getElementById('export-note');
    btn.disabled=true;
    try {
      var startMs=activityStartDate();
      var wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, legendSheet(startMs), 'Legenda');

      var header=XLS_COLS.slice();
      var actHdr='Atividade'+(startMs!=null?(' (desde '+new Date(startMs).toISOString().slice(0,10)+')'):' (sem dados)');
      header[6]=actHdr;

      // Consolidated "Todos" first, then one sheet per token.
      var allRows=[['Token'].concat(header)];
      state.tokens.forEach(function(t){
        var rs=sortedReadings(t.id);
        var sheetRows=[header.slice()];
        rs.forEach(function(r){
          sheetRows.push(readingToRow(r,null));
          allRows.push(readingToRow(r,t.symbol));
        });
        var name=String(t.symbol).slice(0,31).replace(/[\\\/\?\*\[\]:]/g,'');
        XLSX.utils.book_append_sheet(wb, makeSheet(sheetRows,false), name||('Token'+t.id.slice(0,4)));
      });
      // Insert "Todos" right after Legenda for visibility.
      var todos=makeSheet(allRows,true);
      XLSX.utils.book_append_sheet(wb, todos, 'Todos');
      wb.SheetNames.splice(wb.SheetNames.indexOf('Todos'),1);
      wb.SheetNames.splice(1,0,'Todos');

      var fname='bestbuy_dados_'+new Date().toISOString().slice(0,10)+'.xlsx';
      XLSX.writeFile(wb, fname);
      note.textContent='Exportado: '+fname+(startMs==null?' · Atividade ainda sem registos.':'');
    } catch(e){
      note.textContent='Falha ao exportar: '+e.message;
    } finally {
      btn.disabled=false;
    }
  }

  // ── benchmarking report (pt-PT) — opens on logo tap ──────────────────────────
  var PT_MON=['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
  function ptDate(iso){ var d=iso?new Date(iso):new Date(); return d.getUTCDate()+' '+PT_MON[d.getUTCMonth()]+' '+d.getUTCFullYear(); }
  function ptVerdict(s){
    if(s==null)   return 'sem dados suficientes';
    if(s>=8.0)    return 'sinal forte de compra';
    if(s>=6.5)    return 'boa altura para comprar';
    if(s>=4.5)    return 'momento neutro, sem pressa';
    if(s>=3.0)    return 'fraco, melhor aguardar';
    return 'arriscado, evitar por agora';
  }
  function clsScore(s){ return s==null?'n': s>=6.5?'g': s<=4.5?'r':'n'; }
  function clsDelta(cur,prev,higherBetter){
    if(cur==null||prev==null||isNaN(cur)||isNaN(prev)||Number(prev)===0) return 'n';
    var up=Number(cur)>Number(prev), down=Number(cur)<Number(prev);
    if(!up&&!down) return 'n';
    return (higherBetter?up:down)?'g':'r';
  }
  function rLine(parts){
    var p=el('div','report-line');
    parts.forEach(function(seg){
      if(typeof seg==='string') p.appendChild(document.createTextNode(seg));
      else p.appendChild(el('span',seg.c||'n',seg.n));
    });
    return p;
  }
  function buildReport(){
    var body=document.getElementById('report-body'); body.innerHTML='';
    var ranked=state.tokens.map(function(t){ return {t:t,l:latestOf(t.id),p:prevOf(t.id)}; })
      .filter(function(x){ return x.l; })
      .sort(function(a,b){ return Number(b.l.final_score)-Number(a.l.final_score); });

    if(!ranked.length){
      document.getElementById('report-when').textContent='';
      body.appendChild(el('div','report-intro','Ainda não há dados suficientes para gerar o relatório.'));
      return;
    }
    document.getElementById('report-when').textContent='Atualizado a '+ptDate(ranked[0].l.fetched_at);
    body.appendChild(el('div','report-intro',
      'Comparação simples dos '+ranked.length+' ativos do seu painel, sem termos complicados. '+
      'Os números a verde são bons sinais; os números a vermelho são sinais de alerta.'));

    function topic(title,desc){
      var box=el('div','report-topic');
      box.appendChild(el('h3',null,title));
      if(desc) box.appendChild(el('div','desc',desc));
      body.appendChild(box); return box;
    }

    // 1 — Nota geral
    var t1=topic('Nota geral (1 a 10)','A nossa nota junta todos os sinais numa única pontuação fácil de ler.');
    ranked.forEach(function(x){
      var s=Number(x.l.final_score);
      t1.appendChild(rLine(['O '+x.t.symbol+' está com ', {n:fmtScore(s)+'/10', c:clsScore(s)}, ' — '+ptVerdict(s)+'.']));
    });

    // 2 — Preço face à média
    var t2=topic('Preço face à média','Mostra se o preço está acima (bom sinal) ou abaixo (sinal fraco) da média recente.');
    ranked.forEach(function(x){
      var v=x.l.score_price_ma, sv=v==null?null:Number(v);
      t2.appendChild(rLine([x.t.symbol+': ', {n:(sv==null?'—':fmtScore(sv)+'/10'), c:clsScore(sv)},
        ' — preço '+(sv==null?'sem dados':(sv>=5?'acima':'abaixo')+' da média recente')+'.']));
    });

    // 3 — Barato ou esticado (RSI)
    var t3=topic('Está barato ou esticado? (RSI)','O RSI vai de 0 a 100: abaixo de 30 costuma estar barato, acima de 70 esticado.');
    ranked.forEach(function(x){
      var r=x.l.rsi_14, rv=r==null?null:Number(r);
      var c=rv==null?'n': rv<30?'g': rv>70?'r':'n';
      var txt=rv==null?'sem dados': rv<30?'pode estar barato': rv>70?'pode estar caro (esticado)':'em equilíbrio';
      t3.appendChild(rLine([x.t.symbol+': ', {n:(rv==null?'—':fmtNum(rv,0)), c:c}, ' — '+txt+'.']));
    });

    // 4 — Distância ao topo do último ano
    var t4=topic('Quão longe do topo do último ano?','Quanto mais abaixo do valor máximo dos últimos 12 meses, mais barato o ativo parece estar.');
    ranked.forEach(function(x){
      var v=x.l.score_below_high, sv=v==null?null:Number(v);
      var txt=sv==null?'sem dados': sv>=6?'bem abaixo do topo, mais barato': sv<=4?'perto do topo, mais caro':'a meio caminho';
      t4.appendChild(rLine([x.t.symbol+': ', {n:(sv==null?'—':fmtScore(sv)+'/10'), c:clsScore(sv)}, ' — '+txt+'.']));
    });

    // 5 — Fundamentos
    var t5=topic('O projeto tem uso real? (fundamentos)','Dinheiro depositado no projeto (TVL) e as receitas mostram se há uso verdadeiro.');
    ranked.forEach(function(x){
      if(x.l.reweighted){
        t5.appendChild(rLine([x.t.symbol+': ', {n:'sem dados', c:'n'}, ' — avaliado apenas pelo preço de mercado.']));
      } else {
        var pr=x.p||{};
        t5.appendChild(rLine([x.t.symbol+': depósitos ', {n:fmtUsd(x.l.tvl), c:clsDelta(x.l.tvl,pr.tvl,true)},
          ', receita anual ', {n:fmtUsd(x.l.holders_revenue), c:clsDelta(x.l.holders_revenue,pr.holders_revenue,true)}, '.']));
      }
    });

    // 6 — Inflação (emissões de novas moedas)
    var t6=topic('Inflação anual (moedas novas)','Quantas moedas novas entram em circulação por ano. Mais inflação = mais pressão de venda; menos é melhor.');
    ranked.forEach(function(x){
      var ir=x.l.emissions_rate, es=x.l.score_emissions;
      var sv=es==null?null:Number(es);
      var txt=ir==null?'sem dados': sv>=6.5?'baixa — pouca diluição': sv<=4.5?'alta — muita pressão de venda':'moderada';
      t6.appendChild(rLine([x.t.symbol+': ', {n:(ir==null?'—':fmtPct(ir)+' ao ano'), c:clsScore(sv)}, ' — '+txt+'.']));
    });

    // 7 — Conclusão
    var top=ranked[0], bot=ranked[ranked.length-1];
    var t7=topic('Conclusão',null);
    t7.appendChild(rLine(['Hoje, o '+top.t.symbol+' reúne os melhores sinais, com ',
      {n:fmtScore(Number(top.l.final_score))+'/10', c:clsScore(Number(top.l.final_score))}, '.']));
    if(bot!==top){
      t7.appendChild(rLine(['O '+bot.t.symbol+' é o mais arriscado de momento, com ',
        {n:fmtScore(Number(bot.l.final_score))+'/10', c:clsScore(Number(bot.l.final_score))}, '.']));
    }
    body.appendChild(el('div','report-disc',
      'Isto não é aconselhamento financeiro. São apenas sinais automáticos — faça sempre a sua própria análise antes de investir.'));
  }
  function openReport(){ buildReport(); document.getElementById('report-back').classList.add('show'); }
  function closeReport(){ document.getElementById('report-back').classList.remove('show'); }

  function renderAll(){ renderHeader(); renderPillars(); renderRanges(); renderChart(); renderLegend(); renderRankList(); renderManage(); }

  // ── Double-tap to reset zoom/pan ──────────────────────────────────────────────
  // The y-axis is FIXED at 0–100 percentile and is never rescaled by the view — that
  // (window-dependent y-fit) was the old "wiggle in the past". Double-tap/dbl-click
  // just clears any pinch/pan zoom back to the full window.
  function resetChartView(){ var c=state.chart; if(c && c.resetZoom) c.resetZoom(); }

  (function attachChartGestures(){
    var cv=document.getElementById('chart');
    if(!cv) return;
    cv.addEventListener('dblclick', function(e){ e.preventDefault(); resetChartView(); });
    var lt=0, lx=0, ly=0;   // double-tap detector that ignores pinch/pan (single clean tap only)
    cv.addEventListener('touchend', function(e){
      if(e.changedTouches.length!==1 || e.touches.length!==0) return;
      var t=e.changedTouches[0], now=Date.now();
      if(now-lt<300 && Math.abs(t.clientX-lx)<30 && Math.abs(t.clientY-ly)<30){
        e.preventDefault(); resetChartView(); lt=0;
      } else { lt=now; lx=t.clientX; ly=t.clientY; }
    }, {passive:false});
  })();

  document.getElementById('export-btn').onclick=exportExcel;
  document.getElementById('logo').onclick=openReport;
  document.getElementById('report-x').onclick=closeReport;
  document.getElementById('report-back').onclick=function(e){ if(e.target===this) closeReport(); };
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeReport(); });

  load();
})();
</script>
